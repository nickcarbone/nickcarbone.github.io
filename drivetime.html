<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRIVETIME</title>
<style>
  :root {
    --asphalt: #0b0d10;
    --panel: #13161b;
    --panel-2: #1a1e25;
    --line: #262b34;
    --ink: #e8e4da;
    --dim: #7a8290;
    --sodium: #e8a34c;
    --taillight: #e4574c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--asphalt);
    color: var(--ink);
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  .mono { font-family: "SF Mono", "Cascadia Mono", "Consolas", "Menlo", monospace; }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  header h1 {
    font-family: "SF Mono", "Cascadia Mono", "Consolas", "Menlo", monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.28em;
    color: var(--sodium);
    user-select: none;
  }
  header .spacer { flex: 1; }
  select#city {
    background: var(--panel-2);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 7px 10px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    outline: none;
    max-width: 220px;
  }
  select#city:focus-visible { border-color: var(--sodium); }
  .video-wrap { flex: 1; min-height: 0; background: #000; position: relative; }
  .video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  .deck {
    flex-shrink: 0;
    background: var(--panel);
    border-top: 1px solid var(--line);
    padding: 10px 14px 14px;
  }
  .readout { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; min-height: 20px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--line); align-self: center; flex-shrink: 0; }
  .live-dot.on { background: var(--taillight); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: 0.35; } }
  @media (prefers-reduced-motion: reduce) { .live-dot.on { animation: none; } }
  #station-name {
    font-family: "SF Mono", "Cascadia Mono", "Consolas", "Menlo", monospace;
    font-size: 13px; font-weight: 600; letter-spacing: 0.04em; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #station-meta {
    font-family: "SF Mono", "Cascadia Mono", "Consolas", "Menlo", monospace;
    font-size: 11px; color: var(--dim); white-space: nowrap; flex-shrink: 0;
  }
  .presets { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 10px; }
  .preset {
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px;
    color: var(--dim);
    font-family: "SF Mono", "Cascadia Mono", "Consolas", "Menlo", monospace;
    font-size: 11px; padding: 8px 4px; cursor: pointer; text-align: center;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    transition: border-color 0.15s, color 0.15s;
  }
  .preset:hover { border-color: var(--dim); color: var(--ink); }
  .preset:focus-visible { outline: 2px solid var(--sodium); outline-offset: 1px; }
  .preset.active { border-color: var(--sodium); color: var(--sodium); }
  .preset .num { display: block; font-size: 9px; opacity: 0.55; margin-bottom: 2px; }
  .controls { display: flex; align-items: center; gap: 10px; }
  .btn {
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px;
    color: var(--ink);
    font-family: "SF Mono", "Cascadia Mono", "Consolas", "Menlo", monospace;
    font-size: 12px; letter-spacing: 0.08em; padding: 8px 14px; cursor: pointer; flex-shrink: 0;
  }
  .btn:hover { border-color: var(--sodium); color: var(--sodium); }
  .btn:focus-visible { outline: 2px solid var(--sodium); outline-offset: 1px; }
  .btn.primary { border-color: var(--sodium); color: var(--sodium); }
  input[type="range"] { flex: 1; accent-color: var(--sodium); cursor: pointer; }
  .status {
    font-family: "SF Mono", "Cascadia Mono", "Consolas", "Menlo", monospace;
    font-size: 10px; color: var(--dim); margin-top: 8px; min-height: 12px;
  }
  @media (max-width: 480px) {
    .presets { grid-template-columns: repeat(3, 1fr); }
    header h1 { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>DRIVETIME</h1>
  <div class="spacer"></div>
  <label for="city" class="mono" style="font-size:11px;color:var(--dim)">CITY</label>
  <select id="city" aria-label="Choose a city"></select>
</header>

<div class="video-wrap">
  <iframe id="video" title="City drive video"
    allow="autoplay; encrypted-media; picture-in-picture"
    allowfullscreen></iframe>
</div>

<div class="deck">
  <div class="readout">
    <span class="live-dot" id="live"></span>
    <span id="station-name">Pick a city to tune in</span>
    <span id="station-meta"></span>
  </div>
  <div class="presets" id="presets" role="group" aria-label="Station presets"></div>
  <div class="controls">
    <button id="pauseall" class="btn primary" aria-label="Pause or resume video and radio together">⏸ PAUSE ALL</button>
    <button id="power" class="btn" aria-label="Play or stop radio only">■ RADIO</button>
    <input type="range" id="volume" min="0" max="100" value="80" aria-label="Radio volume">
  </div>
  <div class="status" id="status"></div>
</div>

<audio id="radio" preload="none" crossorigin="anonymous"></audio>

<script>
/* =====================================================================
   YOUR CITY LIST — the only thing you ever need to edit.
   Every entry below was machine-verified: embeddable on external
   sites, 1080p or higher, and 30+ minutes long.
   To add a city: youtube.com/watch?v=ABC123 → video: "ABC123",
   plus ISO country code (radio search) and a local-language
   city name stations tend to use (q).
   ===================================================================== */
const CITIES = [

  { name: "Seoul", video: "SRpMapyw6Aw", cc: "KR", q: "Seoul" }, // 63 min · Seoul Night Drive 🌠 | Downtown Vibes | Chill Lof
  { name: "Taipei", video: "P8Uh9f0EaU8", cc: "TW", q: "Taipei" }, // 102 min · Driving Downtown - Taipei Taiwan 4K HDR
  { name: "Hong Kong", video: "arbVnYJfZLU", cc: "HK", q: "Hong Kong" }, // 65 min · Hong Kong 4K - Skyscraper City - Driving Downtow

  { name: "Singapore", video: "xEx3-9v0-_o", cc: "SG", q: "Singapore" }, // 63 min · Singapore 4K - Tropical Skyscrapers - Scenic Dri
  { name: "Mumbai", video: "Nm4PtWe8vlE", cc: "IN", q: "Mumbai" }, // 35 min · 4KHDR Drive in Mumbai's Island City District
  { name: "Delhi", video: "QZPqluJA0OY", cc: "IN", q: "Delhi" }, // 57 min · New Delhi 4K - Sunset Drive - Driving Downtown
  { name: "Dubai", video: "6RPU08WoaxE", cc: "AE", q: "Dubai" }, // 120 min · Dubai 2024 - Driving Tour in 4K
  { name: "Istanbul", video: "ALA09uSzD7E", cc: "TR", q: "Istanbul" }, // 104 min · 🇹🇷 Istanbul Driving Tour Turkey in 4K video. Exp
  { name: "Tbilisi", video: "joszFYjoU5E", cc: "GE", q: "Tbilisi" }, // 38 min · 4K - Tbilisi Virtual Tour, Autumn drive in Georg
  { name: "Cairo", video: "--I-TdCe2_g", cc: "EG", q: "Cairo" }, // 43 min · Cairo 4K - Driving Downtown - Egypt
  { name: "Nairobi", video: "C1iN4D1wBiI", cc: "KE", q: "Nairobi" }, // 30 min · Thika to Nairobi in 30 Minutes | 4K Drive | Gear
  { name: "Lagos", video: "aIuTxasD3uw", cc: "NG", q: "Lagos" }, // 31 min · Driving in Lagos, Nigeria: Lagos Mainland to Lag

  { name: "Athens", video: "8Hm0rMpapKY", cc: "GR", q: "Athens" }, // 64 min · Athens, Greece 🇬🇷 Scenic Drive, Driving Tour 4K 
  { name: "Naples", video: "mA0pPRQthnY", cc: "IT", q: "Napoli" }, // 132 min · Exploring the Beauty of Italy | Rome to Naples R
  { name: "Rome", video: "AdtBRICOD9U", cc: "IT", q: "Roma" }, // 63 min · The Eternal City 4K Driving Tour - Rome Italy Ci
  { name: "Paris", video: "4TKTqb-TWwQ", cc: "FR", q: "Paris" }, // 71 min · City of Light 4K City Drive - Paris France Drivi
  { name: "London", video: "AveGRdBeOog", cc: "GB", q: "London" }, // 48 min · London Hottest Day Drive 🚗 June 2026 London Driv
  { name: "Lisbon", video: "xUZoO-WtyHw", cc: "PT", q: "Lisboa" }, // 52 min · Driving in LISBON (Lisboa) Portugal 🇵🇹 | Scenic 
  { name: "Madrid", video: "C911U_Fo-QU", cc: "ES", q: "Madrid" }, // 68 min · Madrid 4K - Driving Downtown - Spain
  { name: "Berlin", video: "lBlKR2ek0w4", cc: "DE", q: "Berlin" }, // 41 min · BERLIN - Germany 🇩🇪 4K Driving Tour | Alexanderp
  { name: "Warsaw", video: "uJU_DEklaw4", cc: "PL", q: "Warszawa" }, // 35 min · Driving in WARSAW (Warszawa) Poland 🇵🇱 | Old Tow
  { name: "Buenos Aires", video: "MYOj8ckqVuQ", cc: "AR", q: "Buenos Aires" }, // 91 min · Buenos Aires Drive in 4K
  { name: "Sao Paulo", video: "fHEaa2ryFnc", cc: "BR", q: "Sao Paulo" }, // 33 min · Driving São Paulo Brazil 🇧🇷 | 4K City Drive
  { name: "Bogota", video: "N0Qy6oi07W8", cc: "CO", q: "Bogota" }, // 71 min · Bogotá 4K - Driving - Largest Cities in Latin Am
  { name: "Mexico City", video: "Km6KYN_6vmc", cc: "MX", q: "Mexico" }, // 92 min · Mexico City 4K - Driving Tour in 2024 - Ciudad d
  { name: "Havana", video: "vCywf9saDlY", cc: "CU", q: "Habana" }, // 53 min · Cuba. 4K Drive Varadero - Havana
  { name: "New York", video: "7OgQjRn2x1w", cc: "US", q: "New York" }, // 65 min · New York 4K - Driving Tour
  { name: "Los Angeles", video: "7MR08Jm38is", cc: "US", q: "Los Angeles" }, // 56 min · Driving Los Angeles Sunset 4K - The Valley to Ho];

const RB_MIRRORS = [
  "https://de1.api.radio-browser.info",
  "https://fi1.api.radio-browser.info",
  "https://at1.api.radio-browser.info",
];

const els = {
  city: document.getElementById("city"),
  video: document.getElementById("video"),
  presets: document.getElementById("presets"),
  name: document.getElementById("station-name"),
  meta: document.getElementById("station-meta"),
  live: document.getElementById("live"),
  power: document.getElementById("power"),
  pauseall: document.getElementById("pauseall"),
  volume: document.getElementById("volume"),
  status: document.getElementById("status"),
  radio: document.getElementById("radio"),
};

let stations = [];
let currentIdx = -1;
let playing = false;
let allPaused = false;

CITIES.forEach((c, i) => {
  const o = document.createElement("option");
  o.value = i;
  o.textContent = c.name;
  els.city.appendChild(o);
});

async function rbFetch(path) {
  for (const base of RB_MIRRORS) {
    try {
      const r = await fetch(base + path, { headers: { "Accept": "application/json" } });
      if (r.ok) return await r.json();
    } catch (e) { /* next mirror */ }
  }
  throw new Error("All radio mirrors unreachable");
}

/* ---- duplicate-station filter ----
   Same station often appears under several stream entries
   ("Z100 - New York" / "Z100 - WHTZ-FM 100.3"). Rule: exact
   normalized-name match is a dupe; so is a shared distinctive
   first token (callsigns like Z100, WNYC, KIIS) — but generic
   first words (Radio, FM, La, The...) don't count. */
const GENERIC = new Set(["radio","fm","am","the","la","el","le","los","las","my","new","big","hit","hits","top","city"]);
function firstToken(name) {
  const t = (name || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .split(/[^a-z0-9]+/).filter(Boolean);
  return t[0] || "";
}
function normName(name) {
  return (name || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]/g, "");
}
function dedupe(list) {
  const out = [], fulls = new Set(), tokens = new Set();
  for (const s of list) {
    const full = normName(s.name);
    const tok = firstToken(s.name);
    if (fulls.has(full)) continue;
    let prefixDupe = false;
    for (const f of fulls) {
      if (f.length >= 6 && full.length >= 6 && (full.startsWith(f) || f.startsWith(full))) { prefixDupe = true; break; }
    }
    if (prefixDupe) continue;
    if (tok && !GENERIC.has(tok) && tok.length >= 3 && tokens.has(tok)) continue;
    fulls.add(full);
    if (tok && !GENERIC.has(tok)) tokens.add(tok);
    out.push(s);
  }
  return out;
}

async function loadStations(city) {
  els.status.textContent = "SCANNING FREQUENCIES…";
  stations = [];
  renderPresets();
  try {
    let list = await rbFetch(
      "/json/stations/search?limit=60&hidebroken=true&order=clickcount&reverse=true" +
      "&countrycode=" + encodeURIComponent(city.cc) +
      "&name=" + encodeURIComponent(city.q)
    );
    if (!list || list.length < 3) {
      const byCountry = await rbFetch(
        "/json/stations/search?limit=60&hidebroken=true&order=clickcount&reverse=true" +
        "&countrycode=" + encodeURIComponent(city.cc)
      );
      const seen = new Set(list.map(s => s.stationuuid));
      list = list.concat(byCountry.filter(s => !seen.has(s.stationuuid)));
    }
    const https = list.filter(s => (s.url_resolved || "").startsWith("https"));
    const http = list.filter(s => !(s.url_resolved || "").startsWith("https"));
    stations = dedupe(https.concat(http)).slice(0, 6);
    renderPresets();
    els.status.textContent = stations.length
      ? stations.length + " STATIONS FOUND · " + city.cc
      : "NO STATIONS FOUND — TRY ANOTHER CITY";
    if (stations.length && !allPaused) tune(0);
  } catch (e) {
    els.status.textContent = "RADIO SEARCH FAILED — CHECK CONNECTION";
  }
}

function renderPresets() {
  els.presets.innerHTML = "";
  for (let i = 0; i < 6; i++) {
    const s = stations[i];
    const b = document.createElement("button");
    b.className = "preset" + (i === currentIdx ? " active" : "");
    b.disabled = !s;
    b.innerHTML = '<span class="num">' + (i + 1) + "</span>" +
      (s ? escapeHtml(shortName(s.name)) : "—");
    if (s) {
      b.title = s.name;
      b.addEventListener("click", () => { allPaused = false; syncPauseBtn(); tune(i); videoCmd("playVideo"); });
    }
    els.presets.appendChild(b);
  }
}

function shortName(n) { return (n || "").trim().replace(/\s+/g, " ").slice(0, 16); }
function escapeHtml(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

function tune(i) {
  const s = stations[i];
  if (!s) return;
  currentIdx = i;
  els.name.textContent = s.name.trim();
  els.meta.textContent = [s.codec, s.bitrate ? s.bitrate + "kbps" : ""].filter(Boolean).join(" · ");
  els.radio.src = s.url_resolved || s.url;
  els.radio.volume = els.volume.value / 100;
  play();
  renderPresets();
}

function play() {
  els.radio.play().then(() => {
    playing = true;
    els.live.classList.add("on");
    els.power.textContent = "■ RADIO";
    els.status.textContent = "";
  }).catch(() => {
    playing = false;
    els.live.classList.remove("on");
    els.power.textContent = "▶ RADIO";
    els.status.textContent = "STREAM BLOCKED OR OFFLINE — TRY THE NEXT PRESET";
  });
}

function stopRadio() {
  els.radio.pause();
  els.radio.removeAttribute("src");
  els.radio.load();
  playing = false;
  els.live.classList.remove("on");
  els.power.textContent = "▶ RADIO";
}

/* ---- YouTube control via postMessage (no API key, no SDK) ---- */
function videoCmd(func) {
  try {
    els.video.contentWindow.postMessage(
      JSON.stringify({ event: "command", func: func, args: [] }), "*"
    );
  } catch (e) { /* iframe not ready yet */ }
}

function syncPauseBtn() {
  els.pauseall.textContent = allPaused ? "▶ RESUME ALL" : "⏸ PAUSE ALL";
}

els.pauseall.addEventListener("click", () => {
  allPaused = !allPaused;
  if (allPaused) {
    videoCmd("pauseVideo");
    stopRadio();
  } else {
    videoCmd("playVideo");
    if (currentIdx >= 0) tune(currentIdx);
    else if (stations.length) tune(0);
  }
  syncPauseBtn();
});

els.power.addEventListener("click", () => {
  if (playing) stopRadio();
  else if (currentIdx >= 0) tune(currentIdx);
  else if (stations.length) tune(0);
});

els.volume.addEventListener("input", () => { els.radio.volume = els.volume.value / 100; });

els.radio.addEventListener("error", () => {
  if (playing) {
    els.status.textContent = "STREAM DROPPED — TRY ANOTHER PRESET";
    els.live.classList.remove("on");
    playing = false;
    els.power.textContent = "▶ RADIO";
  }
});

function setCity(i) {
  const c = CITIES[i];
  els.video.src = "https://www.youtube.com/embed/" + c.video +
    "?autoplay=1&mute=1&rel=0&modestbranding=1&enablejsapi=1&loop=1&playlist=" + c.video;
  currentIdx = -1;
  stopRadio();
  allPaused = false;
  syncPauseBtn();
  els.name.textContent = "Tuning " + c.name + "…";
  els.meta.textContent = "";
  loadStations(c);
}

els.city.addEventListener("change", e => setCity(+e.target.value));

const start = Math.floor(Math.random() * CITIES.length);
els.city.value = start;
setCity(start);
</script>
</body>
</html>
