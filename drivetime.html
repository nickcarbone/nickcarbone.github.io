<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRIVETIME</title>
<style>
  :root {
    --asphalt: #0b0d10;
    --panel: #13161b;
    --panel-2: #1a1e25;
    --line: #262b34;
    --ink: #e8e4da;
    --dim: #7a8290;
    --sodium: #e8a34c;
    --taillight: #e4574c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--asphalt);
    color: var(--ink);
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  .mono { font-family: "SF Mono", "Cascadia Mono", "Consolas", "Menlo", monospace; }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  header h1 {
    font-family: "SF Mono", "Cascadia Mono", "Consolas", "Menlo", monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.28em;
    color: var(--sodium);
    user-select: none;
  }
  header .spacer { flex: 1; }
  select#city {
    background: var(--panel-2);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 7px 10px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    outline: none;
    max-width: 220px;
  }
  select#city:focus-visible { border-color: var(--sodium); }
  select#view {
    background: var(--panel-2);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 7px 10px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    outline: none;
    max-width: 140px;
  }
  select#view:focus-visible { border-color: var(--sodium); }
  .video-wrap { flex: 1; min-height: 0; background: #000; position: relative; }
  .video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  .deck {
    flex-shrink: 0;
    background: var(--panel);
    border-top: 1px solid var(--line);
    padding: 10px 14px 14px;
  }
  .readout { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; min-height: 20px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--line); align-self: center; flex-shrink: 0; }
  .live-dot.on { background: var(--taillight); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: 0.35; } }
  @media (prefers-reduced-motion: reduce) { .live-dot.on { animation: none; } }
  #station-name {
    font-family: "SF Mono", "Cascadia Mono", "Consolas", "Menlo", monospace;
    font-size: 13px; font-weight: 600; letter-spacing: 0.04em; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #station-meta {
    font-family: "SF Mono", "Cascadia Mono", "Consolas", "Menlo", monospace;
    font-size: 11px; color: var(--dim); white-space: nowrap; flex-shrink: 0;
  }
  .presets { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 10px; }
  .preset {
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px;
    color: var(--dim);
    font-family: "SF Mono", "Cascadia Mono", "Consolas", "Menlo", monospace;
    font-size: 11px; padding: 8px 4px; cursor: pointer; text-align: center;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    transition: border-color 0.15s, color 0.15s;
  }
  .preset:hover { border-color: var(--dim); color: var(--ink); }
  .preset:focus-visible { outline: 2px solid var(--sodium); outline-offset: 1px; }
  .preset.active { border-color: var(--sodium); color: var(--sodium); }
  .preset .num { display: block; font-size: 9px; opacity: 0.55; margin-bottom: 2px; }
  .controls { display: flex; align-items: center; gap: 10px; }
  .btn {
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px;
    color: var(--ink);
    font-family: "SF Mono", "Cascadia Mono", "Consolas", "Menlo", monospace;
    font-size: 12px; letter-spacing: 0.08em; padding: 8px 14px; cursor: pointer; flex-shrink: 0;
  }
  .btn:hover { border-color: var(--sodium); color: var(--sodium); }
  .btn:focus-visible { outline: 2px solid var(--sodium); outline-offset: 1px; }
  .btn.primary { border-color: var(--sodium); color: var(--sodium); }
  input[type="range"] { flex: 1; accent-color: var(--sodium); cursor: pointer; }
  .status {
    font-family: "SF Mono", "Cascadia Mono", "Consolas", "Menlo", monospace;
    font-size: 10px; color: var(--dim); margin-top: 8px; min-height: 12px;
  }
  @media (max-width: 480px) {
    .presets { grid-template-columns: repeat(3, 1fr); }
    header h1 { display: none; }
    #trip { display: none; }
  }

  /* ---- ignition screen ---- */
  #ignition {
    position: fixed; inset: 0; z-index: 50;
    background: var(--asphalt);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px;
  }
  #ignition.hidden { display: none; }
  #ignition svg { opacity: 0.9; }

  /* ---- dash gauge (replaces plain live-dot) ---- */
  #gauge { flex-shrink: 0; overflow: visible; }
  #needle {
    transition: transform 0.35s cubic-bezier(.34,1.2,.64,1), stroke 0.3s;
    transform-origin: 17px 21px;
  }
  #gauge.on #needle, #gauge.on #needle-hub { stroke: var(--sodium); }
  #gauge.on #needle-hub { fill: var(--sodium); }
  #gauge.on path { stroke: var(--line); }

  /* ---- frequency sweep bar ---- */
  .freq {
    position: relative;
    height: 10px;
    margin: 2px 0 10px;
    border-radius: 2px;
    background: repeating-linear-gradient(90deg, var(--line) 0 1px, transparent 1px 9px);
  }
  .freq .dot {
    position: absolute; top: -2px; left: 0%;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--dim);
    box-shadow: none;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .freq.on .dot { background: var(--sodium); box-shadow: 0 0 6px var(--sodium); }

  /* ---- static flicker on city/station change ---- */
  #staticfx {
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: 0;
    background: repeating-linear-gradient(0deg, rgba(232,228,218,0.25) 0 1px, transparent 1px 3px);
    mix-blend-mode: overlay;
  }
  #staticfx.flash { animation: staticflash 0.5s steps(6, end); }
  @keyframes staticflash {
    0% { opacity: 0.7; } 16% { opacity: 0.1; } 33% { opacity: 0.55; }
    50% { opacity: 0.05; } 66% { opacity: 0.4; } 83% { opacity: 0.08; } 100% { opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    #staticfx.flash { animation: none; }
  }

  /* ---- fullscreen "now tuning" overlay ---- */
  #fs-overlay {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 22px 18px 16px;
    background: linear-gradient(transparent, rgba(6,7,9,0.85) 55%);
    opacity: 0;
    pointer-events: none;
    transform: translateY(6px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  #fs-overlay.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  #fs-overlay #fs-needle { transition: transform 0.35s cubic-bezier(.34,1.2,.64,1), stroke 0.3s; transform-origin: 17px 21px; }
  #fs-overlay.on #fs-needle, #fs-overlay.on #fs-needle-hub { stroke: var(--sodium); }
  #fs-overlay.on #fs-needle-hub { fill: var(--sodium); }
  .fs-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  #fs-city {
    font-size: 11px; letter-spacing: 0.12em; color: var(--sodium);
    text-transform: uppercase;
  }
  #fs-station {
    font-size: 14px; font-weight: 600; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #fs-overlay .btn { padding: 8px 12px; }
  @media (prefers-reduced-motion: reduce) { #fs-overlay { transition: none; } }
</style>
</head>
<body>

<div id="ignition">

</div>

</header>

    </div>
    <div class="spacer"></div>
    <button id="fs-prev" class="btn" aria-label="Previous station">◀</button>
    <button id="fs-next" class="btn" aria-label="Next station">▶</button>
  </div>
</div>


<div class="deck">

  </div>
  <div class="freq" id="freq"><span class="dot" id="freq-dot"></span></div>
  <div class="presets" id="presets" role="group" aria-label="Station presets"></div>
  <div class="controls">
    <button id="pauseall" class="btn primary" aria-label="Pause or resume video and radio together">⏸ PAUSE ALL</button>
    <button id="power" class="btn" aria-label="Play or stop radio only">■ RADIO</button>
    <button id="fullscreen" class="btn" aria-label="Toggle fullscreen">⛶ FULLSCREEN</button>
    <input type="range" id="volume" min="0" max="100" value="80" aria-label="Radio volume">

  <div class="status" id="status"></div>
</div>

  trip: document.getElementById("trip"),
};

let stations = [];
let currentIdx = -1;
let playing = false;
let allPaused = false;
let wobbleTimer = null;
let tripStart = null;
let tripTimer = null;
let audioCtx = null;

CITIES.forEach((c, i) => {
  const o = document.createElement("option");
  o.value = i;
  o.textContent = c.name;
  els.city.appendChild(o);
});

function populateViewSelect(city) {
  els.view.innerHTML = "";
  city.videos.forEach((v, i) => {
    const o = document.createElement("option");
    o.value = i;
    o.textContent = v.label;
    els.view.appendChild(o);
  });
  els.view.value = 0;
}

async function rbFetch(path) {
  for (const base of RB_MIRRORS) {
    try {
      const r = await fetch(base + path, { headers: { "Accept": "application/json" } });
      if (r.ok) return await r.json();
    } catch (e) { /* next mirror */ }
  }
  throw new Error("All radio mirrors unreachable");
}

/* ---- duplicate-station filter ----
   Same station often appears under several stream entries
   ("Z100 - New York" / "Z100 - WHTZ-FM 100.3"). Rule: exact
   normalized-name match is a dupe; so is a shared distinctive
   first token (callsigns like Z100, WNYC, KIIS) — but generic
   first words (Radio, FM, La, The...) don't count. */
const GENERIC = new Set(["radio","fm","am","the","la","el","le","los","las","my","new","big","hit","hits","top","city"]);
function firstToken(name) {
  const t = (name || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .split(/[^a-z0-9]+/).filter(Boolean);
  return t[0] || "";
}
function normName(name) {
  return (name || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]/g, "");
}
function dedupe(list) {
  const out = [], fulls = new Set(), tokens = new Set();
  for (const s of list) {
    const full = normName(s.name);
    const tok = firstToken(s.name);
    if (fulls.has(full)) continue;
    let prefixDupe = false;
    for (const f of fulls) {
      if (f.length >= 6 && full.length >= 6 && (full.startsWith(f) || f.startsWith(full))) { prefixDupe = true; break; }
    }
    if (prefixDupe) continue;
    if (tok && !GENERIC.has(tok) && tok.length >= 3 && tokens.has(tok)) continue;
    fulls.add(full);
    if (tok && !GENERIC.has(tok)) tokens.add(tok);
    out.push(s);
  }
  return out;
}

/* ---- dash gauge: needle idles low, sweeps toward "full" and wobbles gently while live ---- */
function setGauge(active) {
  els.gauge.classList.toggle("on", active);
  els.fsOverlay.classList.toggle("on", active);
  if (active) {
    if (!wobbleTimer) wobble();
  } else {
    clearTimeout(wobbleTimer);
    wobbleTimer = null;
    els.needle.setAttribute("transform", "rotate(-80 17 21)");
    els.fsNeedle.setAttribute("transform", "rotate(-80 17 21)");
  }
}
function wobble() {
  const deg = 25 + Math.random() * 45; // sweeps in the "high signal" arc
  els.needle.setAttribute("transform", `rotate(${deg} 17 21)`);
  els.fsNeedle.setAttribute("transform", `rotate(${deg} 17 21)`);
  wobbleTimer = setTimeout(wobble, 700 + Math.random() * 900);
}

/* ---- brief synthesized static burst + visual flicker on tune/city change.
   No audio files, no cost: a few hundred ms of filtered white noise
   generated on the fly with the Web Audio API. AudioContext is created
   on the ignition button press so it's already unlocked by user gesture. */
function staticBurst(durationMs = 380) {
  els.staticfx.classList.remove("flash");
  void els.staticfx.offsetWidth; // restart CSS animation
  els.staticfx.classList.add("flash");
  if (!audioCtx) return;
  try {
    const ctx = audioCtx;
    const len = Math.floor(ctx.sampleRate * (durationMs / 1000));
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = "bandpass";
    filter.frequency.value = 1800;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.05, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.001, ctx.currentTime + durationMs / 1000);
    src.connect(filter).connect(gain).connect(ctx.destination);
    src.start();
    src.stop(ctx.currentTime + durationMs / 1000);
  } catch (e) { /* Web Audio unavailable — visual flicker still plays */ }
}

/* ---- frequency dial sweep: the dot slides across before settling on the preset ---- */
function freqSweep(idx, total) {
  const settle = total > 1 ? (idx / (total - 1)) * 94 : 0;
  els.freq.classList.add("on");
  if (els.freqDot.animate) {
    els.freqDot.animate(
      [{ left: getComputedStyle(els.freqDot).left }, { left: "97%" }, { left: settle + "%" }],
      { duration: 650, easing: "cubic-bezier(.3,.8,.4,1)" }
    );
  }
  els.freqDot.style.left = settle + "%";
}

/* ---- trip clock: counts up from ignition ---- */
function startTrip() {
  tripStart = Date.now();
  clearInterval(tripTimer);
  tripTimer = setInterval(updateTrip, 1000);
  updateTrip();
}
function updateTrip() {
  const s = Math.floor((Date.now() - tripStart) / 1000);
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  const pad = n => String(n).padStart(2, "0");
  els.trip.textContent = "TRIP " + (h > 0 ? `${h}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`);
}


/* ---- preflight test: actually try loading each stream before trusting it.
   Radio Browser's own metadata (hidebroken, lastcheckok) is frequently
   stale, so we verify live in the browser: spin up a throwaway Audio
   element per candidate, give it a few seconds to prove it can play,
   and only stations that pass make it onto a preset button. */
function testStream(url, timeoutMs = 4500) {
  return new Promise((resolve) => {
    const a = new Audio();
    a.preload = "auto";
    let done = false;
    const finish = (ok) => {
      if (done) return;
      done = true;
      a.src = "";
      a.removeAttribute("src");
      try { a.load(); } catch (e) {}
      resolve(ok);
    };
    const t = setTimeout(() => finish(false), timeoutMs);
    a.addEventListener("canplay", () => { clearTimeout(t); finish(true); }, { once: true });
    a.addEventListener("error", () => { clearTimeout(t); finish(false); }, { once: true });
    try { a.src = url; a.load(); } catch (e) { clearTimeout(t); finish(false); }
  });
}

async function testBatch(candidates, need, concurrency = 5) {
  const verified = [];
  let i = 0;
  async function worker() {
    while (i < candidates.length && verified.length < need) {
      const s = candidates[i++];
      const url = s.url_resolved || s.url;
      if (!url) continue;
      const ok = await testStream(url);
      if (ok) verified.push(s);
    }
  }
  const workers = Array.from({ length: Math.min(concurrency, candidates.length) }, worker);
  await Promise.all(workers);
  return verified;
}

let loadToken = 0;
async function loadStations(city) {
  const myToken = ++loadToken;
  els.status.textContent = "SCANNING FREQUENCIES…";
  stations = [];
  renderPresets();
  try {
    let list = await rbFetch(
      "/json/stations/search?limit=80&hidebroken=true&order=clickcount&reverse=true" +
      "&countrycode=" + encodeURIComponent(city.cc) +
      "&name=" + encodeURIComponent(city.q)
    );
    if (!list || list.length < 6) {
      const byCountry = await rbFetch(
        "/json/stations/search?limit=80&hidebroken=true&order=clickcount&reverse=true" +
        "&countrycode=" + encodeURIComponent(city.cc)
      );
      const seen = new Set(list.map(s => s.stationuuid));
      list = list.concat(byCountry.filter(s => !seen.has(s.stationuuid)));
    }
    if (myToken !== loadToken) return; // city changed mid-fetch
    const https = list.filter(s => (s.url_resolved || "").startsWith("https"));
    const http = list.filter(s => !(s.url_resolved || "").startsWith("https"));
    const candidates = dedupe(https.concat(http)).slice(0, 24);

    els.status.textContent = "TESTING SIGNAL STRENGTH…";
    const verified = await testBatch(candidates, 6);
    if (myToken !== loadToken) return; // city changed mid-test

    stations = dedupe(verified).slice(0, 6);
    renderPresets();
    els.status.textContent = stations.length
      ? stations.length + " STATIONS CONFIRMED LIVE · " + city.cc
      : "NO LIVE STATIONS FOUND — TRY ANOTHER CITY";
    if (stations.length && !allPaused) tune(0);
  } catch (e) {
    if (myToken === loadToken) els.status.textContent = "RADIO SEARCH FAILED — CHECK CONNECTION";
  }
}

function renderPresets() {
  els.presets.innerHTML = "";
  for (let i = 0; i < 6; i++) {
    const s = stations[i];
    const b = document.createElement("button");
    b.className = "preset" + (i === currentIdx ? " active" : "");
    b.disabled = !s;
    b.innerHTML = '<span class="num">' + (i + 1) + "</span>" +
      (s ? escapeHtml(shortName(s.name)) : "—");
    if (s) {
      b.title = s.name;
      b.addEventListener("click", () => { allPaused = false; syncPauseBtn(); tune(i); videoCmd("playVideo"); });
    }
    els.presets.appendChild(b);
  }
}

function shortName(n) { return (n || "").trim().replace(/\s+/g, " ").slice(0, 16); }
function escapeHtml(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

function tune(i) {
  const s = stations[i];
  if (!s) return;
  const changed = currentIdx !== i;
  currentIdx = i;
  els.name.textContent = s.name.trim();
  els.meta.textContent = [s.codec, s.bitrate ? s.bitrate + "kbps" : ""].filter(Boolean).join(" · ");
  els.fsStation.textContent = s.name.trim();
  els.radio.src = s.url_resolved || s.url;
  els.radio.volume = els.volume.value / 100;
  if (changed) { staticBurst(); freqSweep(i, stations.length); fsFlash(); }
  play();
  renderPresets();
}

function play() {
  els.radio.play().then(() => {
    playing = true;
    setGauge(true);
    els.power.textContent = "■ RADIO";
    els.status.textContent = "";
  }).catch(() => {
    playing = false;
    setGauge(false);
    els.power.textContent = "▶ RADIO";
    els.status.textContent = "STREAM BLOCKED OR OFFLINE — TRY THE NEXT PRESET";
  });
}

function stopRadio() {
  els.radio.pause();
  els.radio.removeAttribute("src");
  els.radio.load();
  playing = false;
  setGauge(false);
  els.power.textContent = "▶ RADIO";
}

/* ---- YouTube control via postMessage (no API key, no SDK) ---- */
function videoCmd(func) {
  try {
    els.video.contentWindow.postMessage(
      JSON.stringify({ event: "command", func: func, args: [] }), "*"
    );
  } catch (e) { /* iframe not ready yet */ }
}

function syncPauseBtn() {
  els.pauseall.textContent = allPaused ? "▶ RESUME ALL" : "⏸ PAUSE ALL";
}

els.pauseall.addEventListener("click", () => {
  allPaused = !allPaused;
  if (allPaused) {
    videoCmd("pauseVideo");
    stopRadio();
  } else {
    videoCmd("playVideo");
    if (currentIdx >= 0) tune(currentIdx);
    else if (stations.length) tune(0);
  }
  syncPauseBtn();
});

els.power.addEventListener("click", () => {
  if (playing) stopRadio();
  else if (currentIdx >= 0) tune(currentIdx);
  else if (stations.length) tune(0);
});

els.volume.addEventListener("input", () => { els.radio.volume = els.volume.value / 100; });

els.radio.addEventListener("error", () => {
  if (!playing) return;
  setGauge(false);
  playing = false;
  els.power.textContent = "▶ RADIO";
  const next = currentIdx + 1;
  if (next < stations.length) {
    els.status.textContent = "SIGNAL LOST — SEEKING NEXT STATION…";
    tune(next);
  } else {
    els.status.textContent = "SIGNAL LOST — NO MORE PRESETS TO TRY";
  }
});

function setCity(i) {
  const c = CITIES[i];
  populateViewSelect(c);
  els.fsCity.textContent = c.name;
  loadVideo(c, 0);
  currentIdx = -1;
  stopRadio();
  allPaused = false;
  syncPauseBtn();
  els.name.textContent = "Tuning " + c.name + "…";
  els.meta.textContent = "";
  els.fsStation.textContent = "";
  loadStations(c);
}

function loadVideo(city, variantIdx) {
  const v = city.videos[variantIdx] || city.videos[0];
  staticBurst(500);
  els.video.src = "https://www.youtube.com/embed/" + v.id +
    "?autoplay=1&mute=1&rel=0&modestbranding=1&enablejsapi=1&loop=1&playlist=" + v.id;
}

els.city.addEventListener("change", e => setCity(+e.target.value));
els.view.addEventListener("change", e => {
  const c = CITIES[+els.city.value];
  loadVideo(c, +e.target.value);
});

/* ---- fullscreen: request it on the video container only, so the
   deck stays hidden and the overlay becomes the only way to see or
   change the station — mirrors a car head unit's screen. ---- */
function isFS() { return document.fullscreenElement === els.videoWrap; }

let fsHideTimer = null;
function fsShow() {
  if (!isFS()) return;
  els.fsOverlay.classList.add("show");
  clearTimeout(fsHideTimer);
  fsHideTimer = setTimeout(() => els.fsOverlay.classList.remove("show"), 2800);
}
function fsFlash() { if (isFS()) fsShow(); }

els.videoWrap.addEventListener("mousemove", fsShow);
els.videoWrap.addEventListener("mouseenter", fsShow);
document.addEventListener("fullscreenchange", () => {
  if (isFS()) fsShow();
  else { els.fsOverlay.classList.remove("show"); clearTimeout(fsHideTimer); }
});

els.fullscreen.addEventListener("click", () => {
  if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
  else els.videoWrap.requestFullscreen().catch(() => {});
});

function fsStep(delta) {
  if (!stations.length) return;
  let i = (currentIdx + delta + stations.length) % stations.length;
  allPaused = false;
  syncPauseBtn();
  tune(i);
}
els.fsPrev.addEventListener("click", () => fsStep(-1));
els.fsNext.addEventListener("click", () => fsStep(1));

document.addEventListener("keydown", (e) => {
  if (!isFS()) return;
  if (e.key >= "1" && e.key <= "6") {
    const idx = +e.key - 1;
    if (stations[idx]) { allPaused = false; syncPauseBtn(); tune(idx); }
  } else if (e.code === "Space") {
    e.preventDefault();
    els.pauseall.click();
  }
});

/* ---- ignition: gate everything behind one user gesture so audio
   (both the radio stream and the synthesized static bursts) is
   reliably allowed to autoplay from here on out ---- */
els.startEngine.addEventListener("click", () => {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e) { audioCtx = null; }
  els.ignition.classList.add("hidden");
  startTrip();
  const start = Math.floor(Math.random() * CITIES.length);
  els.city.value = start;
  setCity(start);
}, { once: true });
</script>
</body>
</html>
