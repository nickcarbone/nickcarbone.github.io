// Copernicus EMS Rapid Mapping — confirmed live via curl against
// https://rapidmapping.emergency.copernicus.eu/backend/dashboard-api/public-activations-info/
// (real activations returned, e.g. an active French wildfire) AND confirmed
// CORS-open (access-control-allow-origin: *), so this is a genuine no-proxy
// drop-in, unlike EFFIS below.
async function fetchCopernicusEMS() {
  const url = "https://rapidmapping.emergency.copernicus.eu/backend/dashboard-api/public-activations-info/?limit=60";
  const res = await safeFetch(url);
  const data = await res.json();
  return (data.results || []).map(function(a) {
    // centroid arrives as WKT text, e.g. "POINT (5.338 44.702)" — lon then lat.
    const m = /POINT\s*\(\s*([-\d.]+)\s+([-\d.]+)\s*\)/.exec(a.centroid || "");
    if (!m) return null;
    const lon = parseFloat(m[1]), lat = parseFloat(m[2]);
    const t = new Date(a.eventTime || a.activationTime).getTime();
    return {
      id: uid("cems", a.code),
      source: "copernicus_ems",
      lat: lat, lon: lon,
      time: t,
      title: a.name,
      // Confirmed via curl redirect chain: /{code} -> /activations/{code}/
      url: "https://mapping.emergency.copernicus.eu/activations/" + a.code + "/",
      severity: null, // no native severity field on this source — see SOURCES comment
      meta: a.category + " · " + (a.countries || []).join(", ") + " · " + (a.closed ? "closed" : "active") + " · " + a.n_products + " product" + (a.n_products === 1 ? "" : "s"),
      criticalWindowEnd: a.closed ? (t + 3 * 86400000) : (Date.now() + 3600000),
    };
  }).filter(Boolean);
}

// EFFIS — see CONFIG.EFFIS_ENABLED for the full CORS finding. Fetcher is
// correct and endpoint-verified; it only runs once that flag is flipped.
async function fetchEFFIS() {
  if (!CONFIG.EFFIS_ENABLED) throw new Error("EFFIS disabled — see CONFIG.EFFIS_ENABLED");
  if (!CONFIG.CORS_PROXY_URL) throw new Error("EFFIS needs the CORS proxy Worker deployed — see CONFIG.CORS_PROXY_URL");
  const upstream = "https://api.effis.emergency.copernicus.eu/rest/2/burntareas/current/?format=json&limit=200&ordering=-firedate";
  const url = CONFIG.CORS_PROXY_URL + "?url=" + encodeURIComponent(upstream);
  const res = await safeFetch(url);
  const data = await res.json();
  return (data.results || []).map(function(f) {
    const t = new Date(f.firedate).getTime();
    const lat = f.centroid && f.centroid.coordinates ? f.centroid.coordinates[1] : null;
    const lon = f.centroid && f.centroid.coordinates ? f.centroid.coordinates[0] : null;
    return {
      id: uid("effis", f.id),
      source: "effis",
      lat: lat, lon: lon,
      time: t,
      title: "Wildfire — " + (f.commune || f.province || f.countryful),
      url: "https://forest-fire.emergency.copernicus.eu/apps/effis_current_situation_test/",
      severity: null, // no native severity field on this source — see SOURCES comment
      meta: (f.area_ha != null ? f.area_ha : "?") + " ha burnt · " + f.province + ", " + f.countryful,
      criticalWindowEnd: t + 4 * 86400000, // burnt-area records: relevance fades over ~4d post-fire
    };
  }).filter(function(e) { return e.lat != null && e.lon != null; });
}

// NASA EONET (Earth Observatory Natural Event Tracker) — curated multi-hazard
// catalog. Category list deliberately excludes "wildfires" — see the
// SOURCES.eonet comment for why (redundant with FIRMS/EFFIS, and confirmed
// via sampling to mix in prescribed/planned burns alongside genuine fires).
const EONET_CATEGORIES = "drought,dustHaze,earthquakes,floods,landslides,manmade,seaLakeIce,severeStorms,snow,tempExtremes,volcanoes,waterColor";
const EONET_GRACE_MS = 4 * 86400000; // 4d grace after NASA marks an event closed

async function fetchEONET() {
  const url = "https://eonet.gsfc.nasa.gov/api/v3/events?status=open&limit=200&category=" + EONET_CATEGORIES;
  const res = await safeFetch(url);
  const data = await res.json();
  return (data.events || []).map(function(e) {
    const geoms = e.geometry || [];
    const g = geoms[geoms.length - 1]; // most recent position/reading for this event
    if (!g || g.type !== "Point" || !Array.isArray(g.coordinates)) return null; // skip non-point geometries (e.g. polygon tracks) rather than guess a representative point
    const t = Date.parse(g.date);
    if (isNaN(t)) return null;
    const catLabel = (e.categories || []).map(function(c) { return c.title; }).join(", ") || "Uncategorized";
    const mag = (g.magnitudeValue != null && g.magnitudeUnit) ? (" · " + g.magnitudeValue + " " + g.magnitudeUnit) : "";
    return {
      id: uid("eonet", e.id),
      source: "eonet",
      lat: g.coordinates[1],
      lon: g.coordinates[0],
      time: t,
      title: e.title,
      // Prefer the original curating source's own link (e.g. IRWIN, GDACS,
      // InciWeb) over EONET's own JSON API endpoint, which isn't human-readable.
      url: (e.sources && e.sources[0] && e.sources[0].url) || e.link,
      severity: null, // no native severity field — same treatment as GDELT/ReliefWeb/CEMS/EFFIS
      meta: catLabel + mag + (e.closed ? " · closed" : " · ongoing"),
      criticalWindowEnd: e.closed ? (Date.parse(e.closed) + EONET_GRACE_MS) : (Date.now() + 3600000),
    };
  }).filter(Boolean);
}

// NOAA SWPC space weather alerts. No lat/lon — geomagnetic/radio/radiation
// storms are hemispheric or global phenomena, not point events — so these
// show in the Timeline/ticker only, same treatment as GDELT.
//
// Severity comes ONLY from NOAA's own assigned storm-scale level (a "NOAA
// Scale: G/R/S<1-5>" line NOAA itself includes in some but not all message
// types — confirmed via sampling: plain threshold alerts like a standalone
// K-index=4 reading don't reach the G-scale's Kp=5 floor and carry no scale
// line at all). When that line is absent, severity stays null rather than
// being inferred from the raw K-index or message type — same "don't invent
// a score where none exists" rule as everywhere else in this dashboard.
function swpcSeverityFromScale(n) {
  if (n === 1) return "low";
  if (n === 2) return "mid";
  if (n >= 3) return "high";
  return null;
}
async function fetchSWPC() {
  const url = "https://services.swpc.noaa.gov/products/alerts.json";
  const res = await safeFetch(url);
  const data = await res.json();
  return (data || []).map(function(a) {
    const msg = a.message || "";
    // Confirmed via sampling ~50 real alerts across every product_id variant
    // (ALERT/WARNING/WATCH/SUMMARY, plus CANCEL/EXTENDED/CONTINUED prefixes)
    // that this line is present and consistently formatted in every message.
    const titleMatch = /^((?:CONTINUED |EXTENDED |CANCEL )?(?:ALERT|WARNING|WATCH|SUMMARY)):\s*(.+)$/m.exec(msg);
    const scaleMatch = /noaa scale:\s*([GRS])\s*(\d)/i.exec(msg);
    const serialMatch = /Serial Number:\s*(\d+)/.exec(msg);
    const t = Date.parse(a.issue_datetime.replace(" ", "T") + "Z");
    if (isNaN(t)) return null;
    const title = titleMatch ? (titleMatch[1] + ": " + titleMatch[2].trim()) : ("Space weather advisory — " + a.product_id);
    const scaleNum = scaleMatch ? parseInt(scaleMatch[2], 10) : null;
    return {
      id: uid("swpc", a.product_id + "_" + (serialMatch ? serialMatch[1] : a.issue_datetime)),
      source: "swpc",
      lat: null, lon: null,
      time: t,
      title: title,
      // No stable per-alert deep link is published (same limitation as the
      // NWS case) — points to NOAA's live alerts/watches/warnings listing.
      url: "https://www.swpc.noaa.gov/products/alerts-watches-and-warnings",
      severity: scaleMatch ? swpcSeverityFromScale(scaleNum) : null,
      meta: scaleMatch ? ("NOAA Scale: " + scaleMatch[1] + scaleMatch[2]) : "No NOAA scale assigned to this alert",
      criticalWindowEnd: t + 6 * 3600000, // space-weather effects are typically short-lived
    };
  }).filter(Boolean);
}

// ODIN (Outage Data Initiative Nationwide, Oak Ridge National Lab / DOE Office
// of Electricity) — near-real-time US county-level power outage reports from
// participating utilities, via ORNL's Opendatasoft-hosted Open Energy Hub.
// This is the confirmed working replacement for PowerOutage.us, which was
// excluded earlier for having no public API.
async function fetchODIN() {
  // ORNL's Opendatasoft-hosted API caps `limit` at 100 per request (confirmed
  // via a live 400 response testing higher values) — paginate via `offset`
  // rather than a single oversized request. Capped at 3 pages/300 records,
  // comfortably covering ODIN's current ~500-record national total without
  // excessive requests on a 10-minute poll cycle.
  const PAGE_SIZE = 100;
  const MAX_RECORDS = 300;
  let all = [];
  for (let offset = 0; offset < MAX_RECORDS; offset += PAGE_SIZE) {
    const url = "https://ornl.opendatasoft.com/api/explore/v2.1/catalog/datasets/odin-real-time-outages-county/records?limit=" + PAGE_SIZE + "&offset=" + offset;
    const res = await safeFetch(url);
    const data = await res.json();
    if (!data.results || data.results.length === 0) break;
    all = all.concat(data.results);
    if (data.results.length < PAGE_SIZE) break; // reached the end of the dataset
  }
  return all.map(function(r) {
    const pt = r.geo_point_2d;
    if (!pt || pt.lat == null || pt.lon == null) return null;
    const t = r.reportedstarttime ? Date.parse(r.reportedstarttime) : Date.now();
    if (isNaN(t)) return null;
    const utilityName = (r.name || "Unknown utility").replace(/,\s*\d+$/, ""); // strip trailing ",<utility_id>" from the raw name field
    const eta = (r.estimatedrestorationtime && r.estimatedrestorationtime.ert) ? Date.parse(r.estimatedrestorationtime.ert) : null;
    const metersAffected = r.metersaffected != null ? r.metersaffected : "unknown #";
    return {
      id: uid("odin", r.utility_id + "_" + r.county + "_" + r.state),
      source: "odin",
      lat: pt.lat, lon: pt.lon,
      time: t,
      title: "Power outage — " + r.county + ", " + r.state,
      url: "https://ornl.opendatasoft.com/explore/dataset/odin-real-time-outages-county/map/",
      severity: null, // no native severity field — see SOURCES.odin comment
      meta: metersAffected + " meters affected · " + utilityName + (r.cause ? (" · cause: " + r.cause) : "") + ((eta && !isNaN(eta)) ? (" · ETA " + fmtUTC(eta)) : ""),
      criticalWindowEnd: (eta && !isNaN(eta)) ? eta : (Date.now() + 24 * 3600000),
    };
  }).filter(Boolean);
}

const FETCHERS = {
  usgs: fetchUSGS, emsc: fetchEMSC, gdacs: fetchGDACS, firms: fetchFIRMS,
  nws: fetchNWS, launch: fetchLaunch, gdelt: fetchGDELT, reliefweb: fetchReliefWeb,
  copernicus_ems: fetchCopernicusEMS, effis: fetchEFFIS,
  eonet: fetchEONET, swpc: fetchSWPC, odin: fetchODIN,
};


const HIGHLIGHT_MS = 30_000;    // how long the "new" glow lasts on cards + map markers
const TOAST_DISPLAY_MS = 8_000; // how long an individual toast bubble stays visible (shorter than
                                 // the glow on purpose — a stack of 30s toasts would clutter fast
                                 // if several alerts land close together; the persistent glow on
                                 // the card/marker itself is what lasts the full 30s)
let firstBoot = true; // suppress a wall of toasts for everything already-current on initial load

function markSeenAndQueueToasts(key, events) {
  events.forEach(function(e) {
    const wasUnseen = !STATE.seenIds.has(e.id);
    if (wasUnseen) {
      // On first load everything is technically "unseen" this session, but
      // it isn't actually new — it's the existing world state. Backdating
      // firstSeenAt to 0 here means isRecentlyNew() correctly evaluates to
      // false immediately, so the initial data dump doesn't glow/toast as
      // if 300+ events all just happened at once.
      STATE.seenIds.set(e.id, firstBoot ? 0 : Date.now());
    }
    e.firstSeenAt = STATE.seenIds.get(e.id);
    if (wasUnseen && !firstBoot && STATE.notifyEnabled[key]) {
      STATE.toasts.push({
        id: e.id, title: e.title, source: key, severity: e.severity,
        expiresAt: Date.now() + TOAST_DISPLAY_MS,
      });
    }
  });
}

async function refreshSource(key) {
  try {
    const events = await FETCHERS[key]();
    markSeenAndQueueToasts(key, events);
    STATE.events = STATE.events.filter(function(e) { return e.source !== key; }).concat(events);
    markStatus(key, "live");
  } catch (err) {
    markStatus(key, "error", err.message);
  }
  renderAll();
}

function scheduleSource(key) {
  refreshSource(key);
  setInterval(function() { refreshSource(key); }, CONFIG.REFRESH[key]);
}

function renderAll() {
  renderCritical();
  renderTimeline();
  renderUpcoming();
  renderMap();
  renderWeatherLayer();
  renderTicker();
  renderStats();
  renderToasts();
}

// The "new" glow on cards/markers is time-based (now - firstSeenAt < HIGHLIGHT_MS),
// so it needs to fade even between actual data refreshes, not just when new
// data arrives. This tick re-renders the affected views on a short interval
// purely so the highlight visibly decays in real time.
setInterval(function() {
  renderCritical();
  renderTimeline();
  renderUpcoming();
  renderMap();
  renderToasts();
}, 2000);

function renderStats() {
  document.getElementById("statEventCount").textContent = STATE.events.length;
}
setInterval(function() {
  document.getElementById("statClock").textContent = new Date().toISOString().substring(11, 19) + " Z";
}, 1000);

function renderHealthStrip() {
  const strip = document.getElementById("healthStrip");
  const tip = document.getElementById("healthTip");
  strip.innerHTML = "";
  tip.innerHTML = "";
  for (const key in STATE.sourceStatus) {
    const s = STATE.sourceStatus[key];
    const dot = document.createElement("div");
    dot.className = "health-dot " + (s.status === "live" ? "live" : s.status === "error" ? "error" : "");
    strip.appendChild(dot);
    const row = document.createElement("div");
    const label = SOURCES[key].label;
    const statusText = s.status === "live" ? timeAgo(s.lastFetch) : (s.error || "pending");
    row.innerHTML = "<span>" + label + "</span><span>" + statusText + "</span>";
    tip.appendChild(row);
  }
}

const waveCanvas = document.getElementById("waveform");
const waveCtx = waveCanvas.getContext("2d");
function resizeWave() {
  waveCanvas.width = waveCanvas.clientWidth * devicePixelRatio;
  waveCanvas.height = waveCanvas.clientHeight * devicePixelRatio;
}
window.addEventListener("resize", resizeWave);
resizeWave();

let lastEventCountForWave = 0;
setInterval(function() {
  const delta = Math.max(0, STATE.events.length - lastEventCountForWave);
  lastEventCountForWave = STATE.events.length;
  STATE.waveformHistory.push(delta);
  if (STATE.waveformHistory.length > 120) STATE.waveformHistory.shift();
  drawWave();
}, 2000);

function drawWave() {
  const w = waveCanvas.width, h = waveCanvas.height;
  waveCtx.clearRect(0, 0, w, h);
  const hist = STATE.waveformHistory;
  if (hist.length < 2) return;
  const max = Math.max.apply(null, [4].concat(hist));
  const stepX = w / (hist.length - 1);
  waveCtx.beginPath();
  waveCtx.strokeStyle = "#4C8DFF";
  waveCtx.lineWidth = 1.5 * devicePixelRatio;
  hist.forEach(function(v, i) {
    const x = i * stepX;
    const y = h - (v / max) * (h * 0.85) - 2;
    if (i === 0) waveCtx.moveTo(x, y); else waveCtx.lineTo(x, y);
  });
  waveCtx.stroke();
  waveCtx.globalAlpha = 0.12;
  waveCtx.lineTo(w, h); waveCtx.lineTo(0, h); waveCtx.closePath();
  waveCtx.fillStyle = "#4C8DFF";
  waveCtx.fill();
  waveCtx.globalAlpha = 1;
}

function isStillCritical(e) {
  const windowEnd = (typeof e.criticalWindowEnd === "number") ? e.criticalWindowEnd : (e.time + DEFAULT_CRITICAL_WINDOW_MS);
  return Date.now() <= windowEnd;
}

function isRecentlyNew(e) {
  return typeof e.firstSeenAt === "number" && (Date.now() - e.firstSeenAt) < HIGHLIGHT_MS;
}

// Distinguishes "nothing has arrived from any source yet" (still loading)
// from "sources reported in and there's genuinely nothing to show" — on
// first paint, before any fetch resolves, the lists would otherwise render
// an empty-state message that reads as "there is no data" rather than
// "data is on its way", which is a misleading first impression for a
// consumer-facing app.
function sourcesStillLoading() {
  return STATE.events.length === 0 && Object.keys(STATE.sourceStatus).every(function(k) {
    return STATE.sourceStatus[k].status === "pending";
  });
}

function renderCritical() {
  const list = STATE.events
    .filter(function(e) { return (e.severity === "high" || e.severity === "mid") && isStillCritical(e); })
    .sort(function(a, b) {
      const ra = a.severity === "high" ? 0 : 1;
      const rb = b.severity === "high" ? 0 : 1;
      return ra - rb || b.time - a.time;
    })
    .slice(0, 40);

  document.getElementById("critCount").textContent = list.length;
  document.getElementById("tabAlertsCount").textContent = list.length;
  const el = document.getElementById("critList");
  if (list.length === 0) {
    el.innerHTML = sourcesStillLoading()
      ? '<div class="empty-note">Connecting to live sources…</div>'
      : '<div class="empty-note">No high/moderate-severity signals from live sources right now.</div>';
    return;
  }
  el.innerHTML = list.map(function(e) {
    return '<div class="crit-card sev-' + e.severity + (isRecentlyNew(e) ? ' is-new' : '') + '" onclick="openSourceCard(\'' + e.id + '\')">' +
      '<div class="src-badge">' + SOURCES[e.source].label + '</div>' +
      '<div class="title">' + escapeHtml(e.title) + '</div>' +
      '<div class="meta"><span>' + (e.meta || "") + '</span><span>' + timeAgo(e.time) + '</span></div>' +
    '</div>';
  }).join("");
}

// Timeline shows things that have already happened / are actively ongoing,
// in reverse-chronological order. Future-scheduled items (currently only
// rocket launches) are deliberately excluded here — see renderUpcoming()
// below — because mixing "X ago" and "in X" in one reverse-chron list reads
// as broken, not as two different kinds of information.
function renderTimeline() {
  let list = STATE.events.filter(function(e) { return e.time <= Date.now(); }).sort(function(a, b) { return b.time - a.time; });
  if (STATE.searchTerm) {
    const t = STATE.searchTerm.toLowerCase();
    list = list.filter(function(e) {
      return e.title.toLowerCase().indexOf(t) !== -1 ||
        (e.meta || "").toLowerCase().indexOf(t) !== -1 ||
        SOURCES[e.source].label.toLowerCase().indexOf(t) !== -1;
    });
  }
  list = list.slice(0, 150);
  document.getElementById("tlCount").textContent = list.length;
  const el = document.getElementById("tlList");
  if (list.length === 0) {
    el.innerHTML = sourcesStillLoading()
      ? '<div class="empty-note">Connecting to live sources…</div>'
      : (STATE.searchTerm
        ? '<div class="empty-note">No timeline items match "' + escapeHtml(STATE.searchTerm) + '".</div>'
        : '<div class="empty-note">No timeline items right now.</div>');
    return;
  }
  el.innerHTML = list.map(function(e) {
    const src = SOURCES[e.source];
    const unverified = src.verified.toLowerCase().indexOf("unverified") !== -1;
    return '<div class="tl-item' + (isRecentlyNew(e) ? ' is-new' : '') + '">' +
      '<div class="row1"><span class="src ' + src.badge + '">' + src.label + '</span><span class="time">' + timeAgo(e.time) + '</span></div>' +
      '<div class="title">' + escapeHtml(e.title) + '</div>' +
      '<div class="verify ' + (unverified ? "unverified" : "") + '">' + src.verified + '</div>' +
      '<a class="src-link" href="#" onclick="openSourceCard(\'' + e.id + '\'); return false;">source →</a>' +
    '</div>';
  }).join("");
}

// Separate panel for genuinely future-dated items (launch schedules), sorted
// soonest-first, so "in 3d" reads naturally instead of being buried in a
// feed that otherwise means "already happened".
function renderUpcoming() {
  const list = STATE.events
    .filter(function(e) { return e.time > Date.now(); })
    .sort(function(a, b) { return a.time - b.time; })
    .slice(0, 30);
  document.getElementById("upCount").textContent = list.length;
  const tlShown = parseInt(document.getElementById("tlCount").textContent, 10) || 0;
  document.getElementById("tabTimelineCount").textContent = tlShown + list.length;
  const el = document.getElementById("upList");
  if (list.length === 0) {
    el.innerHTML = sourcesStillLoading()
      ? '<div class="empty-note">Connecting to live sources…</div>'
      : '<div class="empty-note">No upcoming scheduled events.</div>';
    return;
  }
  el.innerHTML = list.map(function(e) {
    const src = SOURCES[e.source];
    return '<div class="tl-item' + (isRecentlyNew(e) ? ' is-new' : '') + '">' +
      '<div class="row1"><span class="src ' + src.badge + '">' + src.label + '</span><span class="time">' + timeAgo(e.time) + '</span></div>' +
      '<div class="title">' + escapeHtml(e.title) + '</div>' +
      '<div class="verify">' + (e.meta || "") + '</div>' +
      '<a class="src-link" href="#" onclick="openSourceCard(\'' + e.id + '\'); return false;">source →</a>' +
    '</div>';
  }).join("");
}

document.getElementById("searchInput").addEventListener("input", function(ev) {
  STATE.searchTerm = ev.target.value;
  renderTimeline();
});

function renderTicker() {
  // Ticker is a "what just happened" readout, so future-dated items are
  // excluded here too, same reasoning as the Timeline.
  const list = STATE.events.filter(function(e) { return e.time <= Date.now(); }).sort(function(a, b) { return b.time - a.time; }).slice(0, 30);
  const track = document.getElementById("tickerTrack");
  if (list.length === 0) return;
  const items = list.map(function(e) {
    return '<a href="' + e.url + '" target="_blank" rel="noopener"><b>' + SOURCES[e.source].label + '</b> ' + escapeHtml(e.title) + '</a>';
  }).join("");
  track.innerHTML = items + items;
}

// ============================================================
// AMBIENT WEATHER LAYER (Open-Meteo) — deliberately separate from the
// scored-event pipeline above. Two independent paths:
//   1. Curated locations, fetched in ONE batched request on a timer.
//   2. Click-to-query, fetched on demand for a single clicked point.
// Deliberately NOT part of STATE.events: this is ambient/contextual data,
// not a scored intelligence signal, and mixing it into the critical rail or
// timeline would undercut the dashboard's own "importance over noise"
// premise (a mild breeze in Cairo is not "news").
// ============================================================
const WMO_CODES = {
  0: "Clear sky", 1: "Mainly clear", 2: "Partly cloudy", 3: "Overcast",
  45: "Fog", 48: "Depositing rime fog",
  51: "Light drizzle", 53: "Moderate drizzle", 55: "Dense drizzle",
  56: "Light freezing drizzle", 57: "Dense freezing drizzle",
  61: "Slight rain", 63: "Moderate rain", 65: "Heavy rain",
  66: "Light freezing rain", 67: "Heavy freezing rain",
  71: "Slight snow", 73: "Moderate snow", 75: "Heavy snow", 77: "Snow grains",
  80: "Slight rain showers", 81: "Moderate rain showers", 82: "Violent rain showers",
  85: "Slight snow showers", 86: "Heavy snow showers",
  95: "Thunderstorm", 96: "Thunderstorm, slight hail", 99: "Thunderstorm, heavy hail",
};
function wxLabel(code) { return WMO_CODES[code] !== undefined ? WMO_CODES[code] : "Conditions unavailable"; }
function degToCompass(deg) {
  if (deg == null || isNaN(deg)) return "";
  const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return dirs[Math.round(deg / 22.5) % 16];
}
const WX_CURRENT_PARAMS = "temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_direction_10m";

async function fetchWeatherBatch() {
  const locs = CONFIG.WEATHER_LOCATIONS;
  const lats = locs.map(function(l) { return l.lat; }).join(",");
  const lons = locs.map(function(l) { return l.lon; }).join(",");
  const url = "https://api.open-meteo.com/v1/forecast?latitude=" + lats + "&longitude=" + lons +
    "&current=" + WX_CURRENT_PARAMS + "&timezone=UTC";
  const res = await safeFetch(url);
  const data = await res.json();
  // Open-Meteo returns an array when multiple comma-separated coordinates
  // are requested, and a single object for one location — normalize both.
  const rows = Array.isArray(data) ? data : [data];
  return rows.map(function(d, i) {
    const loc = locs[i];
    const c = d.current || {};
    let t = Date.now();
    if (c.time) { t = Date.parse(c.time + "Z"); if (isNaN(t)) t = Date.now(); }
    return {
      name: loc.name, lat: loc.lat, lon: loc.lon,
      temp: c.temperature_2m, feelsLike: c.apparent_temperature,
      humidity: c.relative_humidity_2m, precip: c.precipitation,
      code: c.weather_code, windSpeed: c.wind_speed_10m, windDir: c.wind_direction_10m,
      time: t,
    };
  });
}

async function refreshWeather() {
  try {
    STATE.weatherLocations = await fetchWeatherBatch();
    markStatus("weather", "live");
  } catch (err) {
    markStatus("weather", "error", err.message);
  }
  renderWeatherLayer();
}

function scheduleWeather() {
  refreshWeather();
  setInterval(refreshWeather, CONFIG.REFRESH.weather);
}

function wxPopupHtml(labelLine, c, timeMs) {
  const temp = c.temp != null ? Math.round(c.temp) : "—";
  const feels = c.feelsLike != null ? Math.round(c.feelsLike) : "—";
  const precipLine = c.precip > 0 ? (" · precip " + c.precip + "mm") : "";
  return '<div class="pop-src">WEATHER · ' + labelLine + '</div>' +
    '<div class="pop-title">' + wxLabel(c.code) + '</div>' +
    '<div class="pop-meta">' + temp + '°C (feels ' + feels + '°C) · humidity ' + (c.humidity != null ? c.humidity : "—") + '%</div>' +
    '<div class="pop-meta">wind ' + Math.round(c.windSpeed || 0) + 'km/h ' + degToCompass(c.windDir) + precipLine + '</div>' +
    '<div class="pop-meta">' + fmtUTC(timeMs) + ' · Open-Meteo model blend</div>';
}

function renderWeatherLayer() {
  if (!map || !layerGroups.weather) return;
  layerGroups.weather.clearLayers();
  (STATE.weatherLocations || []).forEach(function(w) {
    if (w.temp == null) return;
    const marker = L.circleMarker([w.lat, w.lon], {
      radius: 5, color: SOURCES.weather.color, fillColor: SOURCES.weather.color,
      fillOpacity: 0.5, weight: 1.2,
    });
    marker.bindTooltip(Math.round(w.temp) + "°", {
      permanent: true, direction: "top", offset: [0, -5], className: "wx-tooltip",
    });
    marker.bindPopup(wxPopupHtml(escapeHtml(w.name), w, w.time));
    layerGroups.weather.addLayer(marker);
  });
}

let queryMarker = null;
function toggleQueryMode(force) {
  STATE.queryMode = typeof force === "boolean" ? force : !STATE.queryMode;
  const mapEl = document.getElementById("map");
  mapEl.style.cursor = STATE.queryMode ? "crosshair" : "";
  const btn = document.getElementById("btnQueryMode");
  if (btn) btn.classList.toggle("active", STATE.queryMode);
}

async function queryPointWeather(lat, lon) {
  if (queryMarker) { map.removeLayer(queryMarker); queryMarker = null; }
  const marker = L.circleMarker([lat, lon], {
    radius: 6, color: "#fff", fillColor: SOURCES.weather.color, fillOpacity: 0.85, weight: 2,
  }).addTo(map);
  const coordLabel = lat.toFixed(2) + ", " + lon.toFixed(2);
  marker.bindPopup('<div class="pop-src">WEATHER · ' + coordLabel + '</div><div class="pop-title">Loading…</div>').openPopup();
  queryMarker = marker;
  try {
    const url = "https://api.open-meteo.com/v1/forecast?latitude=" + lat.toFixed(4) + "&longitude=" + lon.toFixed(4) +
      "&current=" + WX_CURRENT_PARAMS + "&timezone=UTC";
    const res = await safeFetch(url);
    const data = await res.json();
    const c = data.current || {};
    let t = Date.now();
    if (c.time) { t = Date.parse(c.time + "Z"); if (isNaN(t)) t = Date.now(); }
    marker.setPopupContent(wxPopupHtml(coordLabel, {
      temp: c.temperature_2m, feelsLike: c.apparent_temperature, humidity: c.relative_humidity_2m,
      precip: c.precipitation, code: c.weather_code, windSpeed: c.wind_speed_10m, windDir: c.wind_direction_10m,
    }, t));
  } catch (err) {
    marker.setPopupContent('<div class="pop-src">WEATHER · ' + coordLabel + '</div><div class="pop-title">Query failed</div><div class="pop-meta">' + escapeHtml(err.message) + '</div>');
  }
}

let map, layerGroups = {};
function initMap() {
  // zoomControl lives bottom-right so it never overlaps the layer toggle
  // panel, which stays top-left.
  map = L.map("map", { zoomControl: false, worldCopyJump: true, attributionControl: true }).setView([20, 10], 2);
  L.control.zoom({ position: "bottomright" }).addTo(map);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    attribution: '© OpenStreetMap, © CARTO',
    maxZoom: 18,
  }).addTo(map);

  for (const key of Object.keys(SOURCES)) {
    layerGroups[key] = L.layerGroup().addTo(map);
  }
  renderLayerToggles();

  // Click-to-query weather: only acts while STATE.queryMode is on (toggled
  // via the "Click map for conditions" button), so it never fights with
  // normal map panning or clicking existing markers to open their popups.
  map.on("click", function(ev) {
    if (!STATE.queryMode) return;
    queryPointWeather(ev.latlng.lat, ev.latlng.lng);
  });
}

function updateLayerPanelCaret() {
  const el = document.getElementById("layerToggles");
  const caret = document.getElementById("ltCaret");
  if (!caret) return;
  caret.textContent = el.classList.contains("expanded") ? "▾" : "▸";
}

function renderLayerToggles() {
  const el = document.getElementById("layerToggles");
  let html = '<div class="lt-title"><span>Layers <span class="lt-caret" id="ltCaret">▸</span></span><span class="lt-title-r">Alert</span></div>';
  for (const key in SOURCES) {
    const s = SOURCES[key];
    html += '<div class="layer-row">' +
      '<label class="layer-row-main">' +
        '<input type="checkbox" ' + (STATE.activeLayers[key] ? "checked" : "") + ' data-layer="' + key + '">' +
        '<span class="layer-swatch" style="background:' + s.color + '"></span>' +
        '<span class="layer-label">' + s.label + '</span>' +
      '</label>' +
      '<button type="button" class="info-btn" data-info="' + key + '" aria-label="What does ' + s.label + ' cover?">i</button>' +
      '<div class="info-tip" id="infoTip-' + key + '">' + s.describes + '</div>' +
      '<input type="checkbox" class="notify-check" title="Alert me when ' + s.label + ' has a new item" ' +
        (STATE.notifyEnabled[key] ? "checked" : "") + ' data-notify="' + key + '">' +
    '</div>';
  }
  html += '<button type="button" class="btn-query" id="btnQueryMode">◎ Click map for conditions</button>';
  el.innerHTML = html;
  document.getElementById("btnQueryMode").addEventListener("click", function() { toggleQueryMode(); });
  // Layer panel is collapsed to just its title bar by default — at any
  // viewport, not only mobile — since a fully expanded 9-source list can
  // cover a meaningful chunk of the map regardless of screen size. Tapping
  // the title expands it into a scrollable panel; clicking anywhere outside
  // it collapses it again.
  const ltTitle = el.querySelector(".lt-title");
  if (ltTitle) {
    ltTitle.addEventListener("click", function(ev) {
      ev.stopPropagation();
      el.classList.toggle("expanded");
      updateLayerPanelCaret();
    });
  }
  document.addEventListener("click", function(ev) {
    if (!el.contains(ev.target)) {
      el.classList.remove("expanded");
      updateLayerPanelCaret();
    }
  });
  el.querySelectorAll("input[data-layer]").forEach(function(inp) {
    inp.addEventListener("change", function() {
      const key = inp.dataset.layer;
      STATE.activeLayers[key] = inp.checked;
      if (inp.checked) map.addLayer(layerGroups[key]);
      else map.removeLayer(layerGroups[key]);
    });
  });
  // Info tooltip: works on hover (desktop, via CSS) AND tap (mobile/touch,
  // via this click handler) — a native `title` attribute tooltip has no
  // hover event to trigger it at all on touch devices, so it silently never
  // appears there. A dedicated button also avoids fighting with the
  // checkbox's own click-to-toggle behavior.
  el.querySelectorAll(".info-btn").forEach(function(btn) {
    btn.addEventListener("click", function(ev) {
      ev.stopPropagation();
      const tip = document.getElementById("infoTip-" + btn.dataset.info);
      const wasOpen = tip.classList.contains("open");
      el.querySelectorAll(".info-tip.open").forEach(function(t) { t.classList.remove("open"); });
      if (!wasOpen) tip.classList.add("open");
    });
  });
  document.addEventListener("click", function() {
    el.querySelectorAll(".info-tip.open").forEach(function(t) { t.classList.remove("open"); });
  });
  el.querySelectorAll("input[data-notify]").forEach(function(inp) {
    inp.addEventListener("change", function() {
      STATE.notifyEnabled[inp.dataset.notify] = inp.checked;
    });
  });
  updateLayerPanelCaret();
}

function sevColor(sev, fallback) {
  if (sev === "high") return "#E5484D";
  if (sev === "mid") return "#E8A33D";
  if (sev === "low") return "#3ECF8E";
  return fallback;
}

function renderMap() {
  if (!map) return;
  // "weather" is skipped here deliberately — it isn't populated from
  // STATE.events, so clearing it here would wipe it out with nothing to
  // redraw it until the next 15-minute refresh. It's managed entirely by
  // renderWeatherLayer(), called separately.
  for (const key in layerGroups) {
    if (key === "weather") continue;
    layerGroups[key].clearLayers();
  }
  STATE.events.forEach(function(e) {
    if (e.lat == null || e.lon == null || isNaN(e.lat) || isNaN(e.lon)) return;
    const color = sevColor(e.severity, SOURCES[e.source].color);
    const radius = e.severity === "high" ? 7 : e.severity === "mid" ? 5.5 : 4;
    const markerOpts = { radius: radius, color: color, fillColor: color, fillOpacity: 0.55, weight: 1.2 };
    if (isRecentlyNew(e)) markerOpts.className = "marker-pulse";
    const marker = L.circleMarker([e.lat, e.lon], markerOpts);
    marker.bindPopup(
      '<div class="pop-src">' + SOURCES[e.source].label + '</div>' +
      '<div class="pop-title">' + escapeHtml(e.title) + '</div>' +
      '<div class="pop-meta">' + (e.meta || "") + '</div>' +
      '<div class="pop-meta">' + fmtUTC(e.time) + '</div>' +
      '<a href="' + e.url + '" target="_blank" rel="noopener">Open source →</a>'
    );
    layerGroups[e.source].addLayer(marker);
  });
}

// Toasts are only added to / removed from the DOM here — never wholesale
// rebuilt. The previous version replaced toastStack.innerHTML on every
// call, including the 2s glow-decay tick; since that ran several times
// during a single toast's ~8s lifetime, it kept recreating the same toast's
// DOM node, which re-triggered its slide-in animation each time — reading
// as the toast "sticking and repeating" rather than sliding in once and
// sitting still until it expires.
const toastEls = new Map(); // toast id -> live DOM node
function renderToasts() {
  const now = Date.now();
  STATE.toasts = STATE.toasts.filter(function(t) { return t.expiresAt > now; });
  const el = document.getElementById("toastStack");
  const liveIds = new Set(STATE.toasts.map(function(t) { return t.id; }));

  toastEls.forEach(function(node, id) {
    if (liveIds.has(id)) return;
    node.classList.add("toast-leaving");
    node.addEventListener("animationend", function() { node.remove(); }, { once: true });
    toastEls.delete(id);
  });

  STATE.toasts.forEach(function(t) {
    if (toastEls.has(t.id)) return; // already on screen, animating or settled — leave it alone
    const src = SOURCES[t.source];
    const node = document.createElement("div");
    node.className = "toast sev-" + (t.severity || "none");
    node.innerHTML =
      '<span class="toast-src ' + src.badge + '">' + src.label + '</span>' +
      '<span class="toast-title">' + escapeHtml(t.title) + '</span>';
    el.insertBefore(node, el.firstChild); // newest on top
    toastEls.set(t.id, node);
  });
}

function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str || "";
  return d.innerHTML;
}

// ============================================================
// IN-APP SOURCE CARD — shows an event's full detail (title, meta,
// verification level, timestamp, coordinates) in place, with the external
// link demoted to an explicit "Open source" button rather than the
// immediate result of a tap.
// ============================================================
function findEventById(id) {
  return STATE.events.find(function(e) { return e.id === id; });
}

function openSourceCard(id) {
  const e = findEventById(id);
  if (!e) return; // event aged out of the live feed between render and tap — rare, fails silently
  const src = SOURCES[e.source];
  const hasCoords = e.lat != null && e.lon != null && !isNaN(e.lat) && !isNaN(e.lon);
  document.getElementById("sourceCardBody").innerHTML =
    '<div class="sc-badge ' + src.badge + '">' + src.label + '</div>' +
    '<div class="sc-title">' + escapeHtml(e.title) + '</div>' +
    (e.meta ? '<div class="sc-meta">' + escapeHtml(e.meta) + '</div>' : '') +
    '<div class="sc-row"><span class="sc-k">Verification</span><span class="sc-v">' + escapeHtml(src.verified) + '</span></div>' +
    '<div class="sc-row"><span class="sc-k">Timestamp</span><span class="sc-v">' + fmtUTC(e.time) + ' &middot; ' + timeAgo(e.time) + '</span></div>' +
    (hasCoords ? '<div class="sc-row"><span class="sc-k">Coordinates</span><span class="sc-v">' + e.lat.toFixed(3) + ', ' + e.lon.toFixed(3) + '</span></div>' : '') +
    '<div class="sc-actions">' +
      (hasCoords ? '<button type="button" class="sc-btn" id="scViewMap">View on map</button>' : '') +
      '<a class="sc-btn sc-btn-primary" href="' + e.url + '" target="_blank" rel="noopener">Open source ↗</a>' +
    '</div>';
  document.getElementById("sourceCardOverlay").classList.add("open");
  if (hasCoords) {
    const btn = document.getElementById("scViewMap");
    if (btn) btn.addEventListener("click", function() {
      closeSourceCard();
      setMobileTab("map");
      if (map) map.setView([e.lat, e.lon], Math.max(map.getZoom(), 6));
    });
  }
}
function closeSourceCard() {
  document.getElementById("sourceCardOverlay").classList.remove("open");
}
document.getElementById("scClose").addEventListener("click", closeSourceCard);
document.getElementById("sourceCardOverlay").addEventListener("click", function(ev) {
  if (ev.target === this) closeSourceCard();
});
document.addEventListener("keydown", function(ev) {
  if (ev.key === "Escape") closeSourceCard();
});

// ============================================================
// PANEL COLLAPSE — lets the map reclaim space from either rail.
// Left rail is a single panel, so collapsing it narrows its whole grid
// column. The right rail holds two independent sub-panels (Timeline,
// Upcoming); collapsing one just frees vertical space for the other, and
// the column itself only narrows once BOTH are collapsed.
// ============================================================
function applyCollapseDOM() {
  const c = STATE.collapsed;

  document.getElementById("leftRail").classList.toggle("is-collapsed", c.left);
  document.getElementById("critList").style.display = c.left ? "none" : "";
  document.getElementById("btnToggleLeft").textContent = c.left ? "+" : "−";

  document.getElementById("tlList").style.display = c.timeline ? "none" : "";
  document.getElementById("tlSearchBox").style.display = c.timeline ? "none" : "";
  document.getElementById("btnToggleTimeline").textContent = c.timeline ? "+" : "−";

  document.getElementById("upList").style.display = c.upcoming ? "none" : "";
  document.getElementById("btnToggleUpcoming").textContent = c.upcoming ? "+" : "−";

  const rightBothCollapsed = c.timeline && c.upcoming;
  document.getElementById("rightRail").classList.toggle("is-collapsed", rightBothCollapsed);

  const leftW = c.left ? "40px" : "300px";
  const rightW = rightBothCollapsed ? "40px" : "340px";
  document.getElementById("mainGrid").style.gridTemplateColumns = leftW + " 1fr " + rightW;

  // Leaflet needs to know its container size changed, or it'll render into
  // stale tile bounds until the next manual pan/zoom.
  if (map) setTimeout(function() { map.invalidateSize(); }, 260);
}

document.getElementById("btnToggleLeft").addEventListener("click", function() {
  STATE.collapsed.left = !STATE.collapsed.left;
  applyCollapseDOM();
});
document.getElementById("btnToggleTimeline").addEventListener("click", function() {
  STATE.collapsed.timeline = !STATE.collapsed.timeline;
  applyCollapseDOM();
});
document.getElementById("btnToggleUpcoming").addEventListener("click", function() {
  STATE.collapsed.upcoming = !STATE.collapsed.upcoming;
  applyCollapseDOM();
});

// ============================================================
// MOBILE TAB BAR — below the 900px breakpoint, exactly one of these three
// panels is shown at a time (see CSS); this just toggles which. Harmless
// no-op above the breakpoint since .mobile-tabbar is display:none there
// and its buttons are never clicked.
// ============================================================
const MOBILE_TAB_PANELS = { map: "mapPanel", alerts: "leftRail", timeline: "rightRail" };
function setMobileTab(tab) {
  for (const t in MOBILE_TAB_PANELS) {
    document.getElementById(MOBILE_TAB_PANELS[t]).classList.toggle("mobile-active", t === tab);
  }
  document.querySelectorAll("#mobileTabbar button").forEach(function(btn) {
    btn.classList.toggle("active", btn.dataset.tab === tab);
  });
  // Leaflet caches its container size; a map shown after being display:none
  // reports stale dimensions until told to re-measure.
  if (tab === "map" && map) {
    setTimeout(function() { map.invalidateSize(); }, 60);
  }
}
document.querySelectorAll("#mobileTabbar button").forEach(function(btn) {
  btn.addEventListener("click", function() { setMobileTab(btn.dataset.tab); });
});

// ============================================================
// UPCOMING PANEL — mobile-only collapse. Independent of the desktop
// STATE.collapsed system (which narrows a whole rail column); this just
// hides/shows #upList in place, defaulting to hidden on mobile since it was
// crowding out Timeline, which is the more time-sensitive of the two. The
// matchMedia guard means this listener is a harmless no-op on desktop,
// where the existing collapse button keeps working exactly as before.
STATE.mobileUpcomingExpanded = false;
function applyMobileUpcomingCollapse() {
  const upList = document.getElementById("upList");
  const caret = document.getElementById("upCaret");
  if (!upList || !caret) return;
  upList.classList.toggle("mobile-collapsed", !STATE.mobileUpcomingExpanded);
  caret.textContent = STATE.mobileUpcomingExpanded ? "▾" : "▸";
}
document.getElementById("upcomingHead").addEventListener("click", function() {
  if (!window.matchMedia("(max-width: 900px)").matches) return;
  STATE.mobileUpcomingExpanded = !STATE.mobileUpcomingExpanded;
  applyMobileUpcomingCollapse();
});
applyMobileUpcomingCollapse();

initMap();
renderHealthStrip();
for (const key in SOURCES) {
  if (key === "weather") continue; // has its own fetch shape (Open-Meteo), not part of FETCHERS/STATE.events
  if (key === "reliefweb" && !CONFIG.RELIEFWEB_ENABLED) {
    markStatus(key, "error", "disabled — needs approved appname");
    continue;
  }
  if (key === "effis" && !CONFIG.EFFIS_ENABLED) {
    markStatus(key, "error", "disabled — CORS-blocked, needs a proxy");
    continue;
  }
  scheduleSource(key);
}
scheduleWeather();
setTimeout(function() { if (map) map.invalidateSize(); }, 200);
// Give every source's initial fetch time to land before treating new
// arrivals as genuinely new (see markSeenAndQueueToasts).
setTimeout(function() { firstBoot = false; }, 12000);

// Same tap-support fix as the layer info tooltips: a hover-only tooltip has
// no trigger at all on touch devices.
document.querySelector(".health-strip-wrap").addEventListener("click", function(ev) {
  ev.stopPropagation();
  document.getElementById("healthTip").classList.toggle("open");
});
document.addEventListener("click", function() {
  document.getElementById("healthTip").classList.remove("open");
});
</script>
</body>
</html>
