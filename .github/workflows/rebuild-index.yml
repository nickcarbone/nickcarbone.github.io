name: Rebuild Index

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:          # Manual trigger + callable from publish.html
  push:
    branches: [main]
    paths-ignore:
      - 'pages.json'          # Don't re-trigger on the files this Action writes
      - 'sitemap.xml'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Run rebuild script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node scripts/rebuild-index.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pages.json sitemap.xml
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "chore: rebuild index [skip ci]" &&
            git push
          )
