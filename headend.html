<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEADEND — Master Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14171c;
    --panel-2: #1b1f26;
    --line: #262b33;
    --text: #e8eaed;
    --muted: #8a919c;
    --dim: #5a616b;
    --red: #e5484d;
    --osd: #46e08a;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    font-size: 15px;
    overflow: hidden;
  }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: inherit; }

  /* ---------- HEADER : master control strip ---------- */
  header {
    height: 58px;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 0 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    position: relative;
    z-index: 30;
  }

  .wordmark {
    font-family: "Archivo", sans-serif;
    font-weight: 900;
    font-stretch: 115%;
    font-size: 19px;
    letter-spacing: 0.14em;
    user-select: none;
    white-space: nowrap;
  }
  .wordmark span { color: var(--red); }

  .tally {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--dim);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 5px 11px;
    user-select: none;
  }
  .tally .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
    flex-shrink: 0;
  }
  .tally.live { color: var(--red); border-color: rgba(229,72,77,.45); }
  .tally.live .dot {
    background: var(--red);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(229,72,77,.55); }
    50%      { box-shadow: 0 0 0 6px rgba(229,72,77,0); }
  }

  .clock {
    margin-left: auto;
    font-family: "IBM Plex Mono", monospace;
    font-size: 12.5px;
    color: var(--muted);
    letter-spacing: 0.06em;
    white-space: nowrap;
    user-select: none;
  }
  .clock b { color: var(--text); font-weight: 600; }

  .hbtn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 14px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    background: var(--panel-2);
    border: 1px solid var(--line);
    transition: background .15s, border-color .15s;
    white-space: nowrap;
  }
  .hbtn:hover { background: #232830; border-color: #333a44; }
  .hbtn.primary { background: var(--text); color: #101216; border-color: var(--text); }
  .hbtn.primary:hover { background: #fff; }
  .hbtn svg { flex-shrink: 0; }

  #guideToggle { display: none; }

  /* ---------- LAYOUT ---------- */
  .shell {
    display: flex;
    height: calc(100% - 58px);
  }

  /* ---------- GUIDE (channel rail) ---------- */
  aside {
    width: 300px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    transition: margin-left .25s ease;
  }
  aside.hidden { margin-left: -301px; }

  .guide-head {
    padding: 14px 16px 10px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .guide-head h2 {
    font-family: "Archivo", sans-serif;
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 0.22em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .guide-head .count {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--dim);
  }

  .guide-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--line) transparent;
  }
  .guide-list::-webkit-scrollbar { width: 8px; }
  .guide-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

  .ch {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    text-align: left;
    padding: 11px 10px;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: background .12s;
    position: relative;
  }
  .ch:hover { background: var(--panel-2); }
  .ch.active {
    background: var(--panel-2);
    border-color: var(--line);
  }
  .ch.active::before {
    content: "";
    position: absolute;
    left: -8px; top: 20%;
    height: 60%;
    width: 3px;
    border-radius: 2px;
    background: var(--red);
  }

  .ch .num {
    font-family: "IBM Plex Mono", monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--dim);
    min-width: 34px;
    text-align: right;
    flex-shrink: 0;
  }
  .ch.active .num { color: var(--red); }

  .ch .meta { min-width: 0; flex: 1; }
  .ch .name {
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ch .host {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    color: var(--dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .ch .tools {
    display: none;
    gap: 2px;
    flex-shrink: 0;
  }
  .ch:hover .tools, .ch:focus-within .tools { display: flex; }
  .tool {
    width: 26px; height: 26px;
    display: grid;
    place-items: center;
    border-radius: 6px;
    color: var(--muted);
  }
  .tool:hover { background: #2a303a; color: var(--text); }

  .guide-foot {
    border-top: 1px solid var(--line);
    padding: 10px 12px;
    display: flex;
    gap: 8px;
  }
  .foot-btn {
    flex: 1;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    letter-spacing: 0.1em;
    color: var(--dim);
    padding: 7px 4px;
    border-radius: 6px;
    border: 1px solid var(--line);
    text-transform: uppercase;
    transition: color .15s, border-color .15s;
  }
  .foot-btn:hover { color: var(--text); border-color: #3a414c; }

  /* ---------- STAGE ---------- */
  main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  .stage {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px;
    min-height: 0;
  }

  .screen {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: calc((100vh - 200px) * 16 / 9);
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--line);
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }

  .screen iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: #000;
  }

  /* OSD channel bug */
  .osd {
    position: absolute;
    top: 18px; right: 22px;
    font-family: "IBM Plex Mono", monospace;
    font-weight: 600;
    font-size: clamp(28px, 4vw, 44px);
    color: var(--osd);
    text-shadow: 0 0 14px rgba(70,224,138,.55), 0 2px 4px rgba(0,0,0,.8);
    letter-spacing: 0.08em;
    opacity: 0;
    pointer-events: none;
    z-index: 5;
  }
  .osd.show { animation: osd 2.4s ease forwards; }
  @keyframes osd {
    0%   { opacity: 0; }
    6%   { opacity: 1; }
    75%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* tuning flash */
  .tune-flash {
    position: absolute;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    z-index: 4;
  }
  .tune-flash.show { animation: flash .3s ease; }
  @keyframes flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .osd.show { animation: none; opacity: 1; transition: opacity .2s; }
    .tune-flash.show { animation: none; }
    .tally.live .dot { animation: none; }
    aside { transition: none; }
  }

  /* ---------- NOW BAR ---------- */
  .nowbar {
    height: 62px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    border-top: 1px solid var(--line);
    background: var(--panel);
  }
  .nowbar .num {
    font-family: "IBM Plex Mono", monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--red);
    min-width: 40px;
  }
  .nowbar .name {
    font-family: "Archivo", sans-serif;
    font-weight: 800;
    font-size: 17px;
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nowbar .src {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 40px;
  }
  .nowbar .actions { display: flex; gap: 8px; flex-shrink: 0; }

  /* ---------- EMPTY STATE ---------- */
  .empty {
    text-align: center;
    max-width: 420px;
    padding: 40px 24px;
  }
  .empty .badge {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--osd);
    margin-bottom: 18px;
  }
  .empty h1 {
    font-family: "Archivo", sans-serif;
    font-weight: 900;
    font-stretch: 115%;
    font-size: 30px;
    letter-spacing: 0.02em;
    margin-bottom: 12px;
  }
  .empty p { color: var(--muted); line-height: 1.55; margin-bottom: 26px; }

  /* ---------- MODAL ---------- */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,7,9,.72);
    backdrop-filter: blur(3px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .overlay.open { display: flex; }

  .modal {
    width: 100%;
    max-width: 520px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 26px 26px 22px;
    box-shadow: 0 30px 80px rgba(0,0,0,.6);
  }
  .modal h3 {
    font-family: "Archivo", sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }
  .field input, .field textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 12px;
    font-size: 14px;
    outline: none;
    transition: border-color .15s;
  }
  .field textarea {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12.5px;
    resize: vertical;
    min-height: 74px;
    line-height: 1.5;
  }
  .field input:focus, .field textarea:focus { border-color: #4a5260; }
  .field .hint {
    font-size: 11.5px;
    color: var(--dim);
    margin-top: 5px;
    line-height: 1.45;
  }
  .row2 { display: flex; gap: 12px; }
  .row2 .field:first-child { width: 110px; flex-shrink: 0; }
  .row2 .field:last-child { flex: 1; }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 6px;
  }

  /* ---------- TOAST ---------- */
  .toast {
    position: fixed;
    bottom: 84px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    padding: 10px 18px;
    border-radius: 8px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 200;
    box-shadow: 0 10px 30px rgba(0,0,0,.5);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- KEYBOARD HINT ---------- */
  .kbd-hint {
    position: absolute;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--dim);
    user-select: none;
    white-space: nowrap;
  }
  .kbd-hint kbd {
    font-family: inherit;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1px 5px;
    margin: 0 2px;
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 860px) {
    #guideToggle { display: inline-flex; }
    .clock .date-part { display: none; }
    aside {
      position: fixed;
      top: 58px; left: 0; bottom: 0;
      z-index: 40;
      width: 290px;
      box-shadow: 20px 0 50px rgba(0,0,0,.5);
    }
    aside.hidden { margin-left: -291px; box-shadow: none; }
    .stage { padding: 12px; }
    .nowbar { padding: 0 14px; gap: 10px; }
    .nowbar .src { display: none; }
    .kbd-hint { display: none; }
    .wordmark { font-size: 16px; }
  }
</style>
</head>
<body>

<header>
  <button class="hbtn" id="guideToggle" aria-label="Toggle channel guide" title="Toggle guide">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
  <div class="wordmark">HEAD<span>END</span></div>
  <div class="tally" id="tally"><span class="dot"></span><span id="tallyText">STANDBY</span></div>
  <div class="clock" id="clock"></div>
  <button class="hbtn" id="theaterBtn" title="Theater mode (T)">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
    Theater
  </button>
  <button class="hbtn primary" id="addBtn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    Add channel
  </button>
</header>

<div class="shell">
  <aside id="guide">
    <div class="guide-head">
      <h2>Channel Guide</h2>
      <span class="count" id="chCount"></span>
    </div>
    <div class="guide-list" id="guideList"></div>
    <div class="guide-foot">
      <button class="foot-btn" id="exportBtn" title="Download your lineup as JSON">Export</button>
      <button class="foot-btn" id="importBtn" title="Restore a lineup from JSON">Import</button>
      <input type="file" id="importFile" accept="application/json" hidden>
    </div>
  </aside>

  <main>
    <div class="stage" id="stage">
      <!-- populated by JS: empty state or screen -->
    </div>
    <div class="nowbar" id="nowbar" style="display:none">
      <span class="num" id="nowNum"></span>
      <span class="name" id="nowName"></span>
      <span class="src" id="nowSrc"></span>
      <div class="actions">
        <button class="hbtn" id="reloadBtn" title="Reload stream">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg>
          Reload
        </button>
        <button class="hbtn" id="popoutBtn" title="Open source in a new tab (for streams that refuse to embed)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14 21 3"/></svg>
          Open in tab
        </button>
      </div>
    </div>
  </main>
</div>

<!-- Add / Edit modal -->
<div class="overlay" id="modalOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <h3 id="modalTitle">Add Channel</h3>
    <div class="row2">
      <div class="field">
        <label for="fNum">Channel №</label>
        <input id="fNum" type="number" min="1" max="9999" inputmode="numeric">
      </div>
      <div class="field">
        <label for="fName">Name</label>
        <input id="fName" type="text" placeholder="e.g. NASA TV" maxlength="60">
      </div>
    </div>
    <div class="field">
      <label for="fUrl">Stream URL or embed code</label>
      <textarea id="fUrl" placeholder="Paste a URL or a full &lt;iframe …&gt; snippet — the src is extracted automatically" spellcheck="false"></textarea>
      <div class="hint">Works with anything embeddable: YouTube live embeds, Twitch, Vimeo, public broadcaster players. Some sites block embedding (X-Frame-Options) — use "Open in tab" for those.</div>
    </div>
    <div class="modal-actions">
      <button class="hbtn" id="cancelBtn">Cancel</button>
      <button class="hbtn primary" id="saveBtn">Save channel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";

  /* ---------- state ---------- */
  const LS_KEY = "headend.channels.v1";
  const LS_LAST = "headend.lastTuned.v1";

  const SEEDS = [
    { id: cryptoId(), num: 1, name: "NASA TV", url: "https://www.youtube.com/embed/live_stream?channel=UCLA_DiR1FfKNvjuUpBHmylQ&autoplay=1" },
    { id: cryptoId(), num: 2, name: "Al Jazeera English", url: "https://www.youtube.com/embed/live_stream?channel=UCNye-wNBqNL5ZzHSJj3l8Bg&autoplay=1" }
  ];

  let channels = load();
  let currentId = null;
  let editingId = null;
  let memoryOnly = false;
  let digitBuffer = "";
  let digitTimer = null;

  /* ---------- storage ---------- */
  function load() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (raw === null) {
        localStorage.setItem(LS_KEY, JSON.stringify(SEEDS));
        return SEEDS.slice();
      }
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
      memoryOnly = true;
      return SEEDS.slice();
    }
  }

  function persist() {
    if (memoryOnly) return;
    try { localStorage.setItem(LS_KEY, JSON.stringify(channels)); } catch (e) {}
  }

  function cryptoId() {
    return "ch_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
  }

  /* ---------- helpers ---------- */
  const $ = (sel) => document.querySelector(sel);

  function extractSrc(input) {
    const trimmed = (input || "").trim();
    if (!trimmed) return "";
    // Full iframe snippet? Pull the src attribute.
    const m = trimmed.match(/src\s*=\s*["']([^"']+)["']/i);
    if (m) return m[1];
    return trimmed;
  }

  function hostOf(url) {
    try { return new URL(url).hostname.replace(/^www\./, ""); }
    catch (e) { return url.slice(0, 40); }
  }

  function sortChannels() {
    channels.sort((a, b) => (a.num - b.num) || a.name.localeCompare(b.name));
  }

  function nextNum() {
    return channels.length ? Math.max(...channels.map(c => c.num)) + 1 : 1;
  }

  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  /* ---------- toast ---------- */
  let toastTimer = null;
  function toast(msg) {
    const t = $("#toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2400);
  }

  /* ---------- clock ---------- */
  function tickClock() {
    const now = new Date();
    const local = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    const utc = now.toISOString().slice(11, 16);
    const date = now.toLocaleDateString([], { weekday: "short", month: "short", day: "numeric" });
    $("#clock").innerHTML = '<span class="date-part">' + esc(date) + " &nbsp;·&nbsp; </span><b>" + esc(local) + "</b> &nbsp;/&nbsp; " + esc(utc) + " UTC";
  }
  tickClock();
  setInterval(tickClock, 1000);

  /* ---------- guide rendering ---------- */
  function renderGuide() {
    sortChannels();
    const list = $("#guideList");
    list.innerHTML = "";
    $("#chCount").textContent = channels.length ? channels.length + (channels.length === 1 ? " CH" : " CHS") : "";

    channels.forEach(ch => {
      const btn = document.createElement("button");
      btn.className = "ch" + (ch.id === currentId ? " active" : "");
      btn.setAttribute("data-id", ch.id);
      btn.innerHTML =
        '<span class="num">' + esc(String(ch.num).padStart(2, "0")) + "</span>" +
        '<span class="meta"><span class="name">' + esc(ch.name) + '</span><span class="host">' + esc(hostOf(ch.url)) + "</span></span>" +
        '<span class="tools">' +
          '<span class="tool" data-act="edit" title="Edit" role="button" tabindex="0">' +
            '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.8 2.8 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>' +
          "</span>" +
          '<span class="tool" data-act="del" title="Delete" role="button" tabindex="0">' +
            '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V6"/></svg>' +
          "</span>" +
        "</span>";
      list.appendChild(btn);
    });
  }

  $("#guideList").addEventListener("click", (e) => {
    const tool = e.target.closest(".tool");
    const chEl = e.target.closest(".ch");
    if (!chEl) return;
    const id = chEl.getAttribute("data-id");
    if (tool) {
      e.stopPropagation();
      if (tool.getAttribute("data-act") === "edit") openModal(id);
      else deleteChannel(id);
      return;
    }
    tune(id);
  });

  /* ---------- stage / tuning ---------- */
  function renderStage() {
    const stage = $("#stage");
    const ch = channels.find(c => c.id === currentId);

    if (!ch) {
      stage.innerHTML =
        '<div class="empty">' +
          '<div class="badge">NO SIGNAL</div>' +
          "<h1>Nothing on the air.</h1>" +
          "<p>Add a channel to start your lineup. Paste any embeddable livestream URL — or a full iframe snippet — and it slots straight into the guide.</p>" +
          '<button class="hbtn primary" id="emptyAdd">Add your first channel</button>' +
        "</div>";
      $("#nowbar").style.display = "none";
      setTally(false);
      const ea = $("#emptyAdd");
      if (ea) ea.addEventListener("click", () => openModal(null));
      return;
    }

    stage.innerHTML =
      '<div class="screen">' +
        '<iframe id="player" src="' + esc(ch.url) + '" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>' +
        '<div class="tune-flash" id="tuneFlash"></div>' +
        '<div class="osd" id="osd"></div>' +
      "</div>" +
      '<div class="kbd-hint"><kbd>↑</kbd><kbd>↓</kbd> surf &nbsp; <kbd>0–9</kbd> direct tune &nbsp; <kbd>T</kbd> theater</div>';

    $("#nowbar").style.display = "";
    $("#nowNum").textContent = String(ch.num).padStart(2, "0");
    $("#nowName").textContent = ch.name;
    $("#nowSrc").textContent = ch.url;
    setTally(true);

    // OSD + flash
    requestAnimationFrame(() => {
      const flash = $("#tuneFlash");
      const osd = $("#osd");
      if (flash) { flash.classList.remove("show"); void flash.offsetWidth; flash.classList.add("show"); }
      if (osd) {
        osd.textContent = String(ch.num).padStart(2, "0");
        osd.classList.remove("show"); void osd.offsetWidth; osd.classList.add("show");
      }
    });
  }

  function setTally(live) {
    const t = $("#tally");
    t.classList.toggle("live", live);
    $("#tallyText").textContent = live ? "ON AIR" : "STANDBY";
  }

  function tune(id) {
    if (id === currentId) return;
    currentId = id;
    try { localStorage.setItem(LS_LAST, id || ""); } catch (e) {}
    renderGuide();
    renderStage();
  }

  function tuneByOffset(delta) {
    if (!channels.length) return;
    sortChannels();
    const idx = channels.findIndex(c => c.id === currentId);
    let next;
    if (idx === -1) next = channels[0];
    else next = channels[(idx + delta + channels.length) % channels.length];
    tune(next.id);
  }

  function tuneByNumber(num) {
    const ch = channels.find(c => c.num === num);
    if (ch) tune(ch.id);
    else toast("No channel " + num);
  }

  /* ---------- add / edit / delete ---------- */
  function openModal(id) {
    editingId = id;
    const ch = id ? channels.find(c => c.id === id) : null;
    $("#modalTitle").textContent = ch ? "Edit Channel" : "Add Channel";
    $("#fNum").value = ch ? ch.num : nextNum();
    $("#fName").value = ch ? ch.name : "";
    $("#fUrl").value = ch ? ch.url : "";
    $("#modalOverlay").classList.add("open");
    setTimeout(() => $(ch ? "#fName" : "#fUrl").focus(), 50);
  }

  function closeModal() {
    $("#modalOverlay").classList.remove("open");
    editingId = null;
  }

  function saveChannel() {
    const num = parseInt($("#fNum").value, 10);
    const name = $("#fName").value.trim();
    const url = extractSrc($("#fUrl").value);

    if (!name) { toast("Give the channel a name"); $("#fName").focus(); return; }
    if (!url || !/^https?:\/\//i.test(url)) { toast("Enter a valid http(s) URL or embed code"); $("#fUrl").focus(); return; }
    const finalNum = isNaN(num) || num < 1 ? nextNum() : num;

    if (editingId) {
      const ch = channels.find(c => c.id === editingId);
      const urlChanged = ch.url !== url;
      ch.num = finalNum; ch.name = name; ch.url = url;
      persist();
      renderGuide();
      if (editingId === currentId) {
        if (urlChanged) renderStage();
        else {
          $("#nowNum").textContent = String(ch.num).padStart(2, "0");
          $("#nowName").textContent = ch.name;
        }
      }
      toast("Channel updated");
    } else {
      const ch = { id: cryptoId(), num: finalNum, name, url };
      channels.push(ch);
      persist();
      renderGuide();
      tune(ch.id);
      toast("Tuned to " + name);
    }
    closeModal();
  }

  function deleteChannel(id) {
    const ch = channels.find(c => c.id === id);
    if (!ch) return;
    if (!confirm('Delete "' + ch.name + '" from the lineup?')) return;
    channels = channels.filter(c => c.id !== id);
    persist();
    if (currentId === id) {
      currentId = null;
      sortChannels();
      if (channels.length) tune(channels[0].id);
      else { renderGuide(); renderStage(); }
    } else {
      renderGuide();
    }
    toast("Channel removed");
  }

  /* ---------- export / import ---------- */
  function exportLineup() {
    const blob = new Blob([JSON.stringify(channels, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "headend-lineup.json";
    a.click();
    URL.revokeObjectURL(a.href);
    toast("Lineup exported");
  }

  function importLineup(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!Array.isArray(data)) throw new Error("bad format");
        const clean = data
          .filter(c => c && typeof c.url === "string" && /^https?:\/\//i.test(c.url))
          .map((c, i) => ({
            id: cryptoId(),
            num: Number.isFinite(+c.num) ? +c.num : i + 1,
            name: String(c.name || "Channel " + (i + 1)).slice(0, 60),
            url: c.url
          }));
        if (!clean.length) { toast("No valid channels in that file"); return; }
        channels = clean;
        currentId = null;
        persist();
        renderGuide();
        tune(channels[0].id);
        toast("Imported " + clean.length + " channel" + (clean.length === 1 ? "" : "s"));
      } catch (e) {
        toast("Couldn't read that file — expected HEADEND JSON");
      }
    };
    reader.readAsText(file);
  }

  /* ---------- keyboard ---------- */
  document.addEventListener("keydown", (e) => {
    const typing = /^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName);
    if ($("#modalOverlay").classList.contains("open")) {
      if (e.key === "Escape") closeModal();
      if (e.key === "Enter" && document.activeElement.tagName !== "TEXTAREA") { e.preventDefault(); saveChannel(); }
      return;
    }
    if (typing) return;

    if (e.key === "ArrowUp")   { e.preventDefault(); tuneByOffset(-1); }
    if (e.key === "ArrowDown") { e.preventDefault(); tuneByOffset(1); }
    if (e.key === "t" || e.key === "T") toggleTheater();
    if (e.key === "g" || e.key === "G") $("#guide").classList.toggle("hidden");

    if (/^[0-9]$/.test(e.key)) {
      digitBuffer += e.key;
      const osd = $("#osd");
      if (osd) {
        osd.textContent = digitBuffer;
        osd.classList.remove("show"); void osd.offsetWidth; osd.classList.add("show");
      }
      clearTimeout(digitTimer);
      digitTimer = setTimeout(() => {
        const n = parseInt(digitBuffer, 10);
        digitBuffer = "";
        if (!isNaN(n)) tuneByNumber(n);
      }, 900);
    }
  });

  /* ---------- theater ---------- */
  function toggleTheater() {
    $("#guide").classList.toggle("hidden");
    const on = $("#guide").classList.contains("hidden");
    $("#theaterBtn").classList.toggle("primary", on);
  }

  /* ---------- wire up ---------- */
  $("#addBtn").addEventListener("click", () => openModal(null));
  $("#cancelBtn").addEventListener("click", closeModal);
  $("#saveBtn").addEventListener("click", saveChannel);
  $("#modalOverlay").addEventListener("click", (e) => { if (e.target === e.currentTarget) closeModal(); });
  $("#theaterBtn").addEventListener("click", toggleTheater);
  $("#guideToggle").addEventListener("click", () => $("#guide").classList.toggle("hidden"));
  $("#exportBtn").addEventListener("click", exportLineup);
  $("#importBtn").addEventListener("click", () => $("#importFile").click());
  $("#importFile").addEventListener("change", (e) => {
    if (e.target.files && e.target.files[0]) importLineup(e.target.files[0]);
    e.target.value = "";
  });
  $("#reloadBtn").addEventListener("click", () => {
    const p = $("#player");
    if (p) { const src = p.src; p.src = "about:blank"; requestAnimationFrame(() => p.src = src); toast("Stream reloaded"); }
  });
  $("#popoutBtn").addEventListener("click", () => {
    const ch = channels.find(c => c.id === currentId);
    if (ch) window.open(ch.url, "_blank", "noopener");
  });

  /* ---------- boot ---------- */
  renderGuide();
  let last = null;
  try { last = localStorage.getItem(LS_LAST); } catch (e) {}
  if (last && channels.some(c => c.id === last)) {
    tune(last);
  } else if (channels.length) {
    sortChannels();
    tune(channels[0].id);
  } else {
    renderStage();
  }
  if (memoryOnly) toast("Storage unavailable — lineup won't persist this session");
})();
</script>
</body>
</html>
